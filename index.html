window.openTTKCatsModal=function(){
  function getCats(){return APP_SETTINGS.ttkCats||[];}
  function saveCats(arr){APP_SETTINGS.ttkCats=arr;saveSettings();}

  function renderCatsList(){
    var cats=getCats();
    if(!cats.length)return '<div style="text-align:center;padding:20px;font-size:12px;color:#475569">Нет категорий. Добавьте первую.</div>';
    return cats.map(function(cat,idx){
      var inUse=DB.ttk.some(function(t){return t.category===cat;});
      var count=DB.ttk.filter(function(t){return t.category===cat;}).length;
      return '<div class="settings-row" style="padding:8px 0" id="catrow'+idx+'">'+
        '<div id="catview'+idx+'" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">'+
          '<span style="font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(cat)+'</span>'+
          '<span style="font-size:10px;color:#475569;flex-shrink:0">'+(count?count+' блюд':'пусто')+'</span>'+
        '</div>'+
        '<div id="catedit'+idx+'" style="display:none;flex:1">'+
          '<input id="catinp'+idx+'" class="inp" value="'+esc(cat)+'" style="font-size:12px;padding:7px 10px" oninput="markModalDirty()" onkeydown="if(event.keyCode===13)window._saveCatEdit('+idx+')">'+
        '</div>'+
        '<div style="display:flex;gap:5px;flex-shrink:0;margin-left:6px">'+
          // move up
          '<button id="catbtn_edit'+idx+'" onclick="window._startCatEdit('+idx+')" style="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#6366f1;border-radius:7px;padding:4px 8px;font-size:11px;cursor:pointer;font-weight:700">✏</button>'+
          // move up
          (idx>0?'<button onclick="window._moveCat('+idx+',-1)" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#94a3b8;border-radius:7px;padding:4px 7px;font-size:11px;cursor:pointer">↑</button>':'<span style="width:26px"></span>')+
          // move down
          (idx<cats.length-1?'<button onclick="window._moveCat('+idx+',1)" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#94a3b8;border-radius:7px;padding:4px 7px;font-size:11px;cursor:pointer">↓</button>':'<span style="width:26px"></span>')+
          // delete
          (!inUse?'<button onclick="window._deleteCat('+idx+')" class="trash-del-btn" style="font-size:14px">×</button>':'<span style="width:24px" title="Удалите все ТТК этой категории"></span>')+
        '</div>'+
      '</div>';
    }).join('');
  }

  function refreshList(){
    var wrap=document.getElementById('catsListWrap');
    if(wrap)wrap.innerHTML=renderCatsList();
  }

  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<div class="modal-title">Категории ТТК</div>'+
    // Add new category
    '<div style="display:flex;gap:8px;margin-bottom:14px">'+
      '<input id="newCatInp" class="inp" placeholder="Название новой категории" style="flex:1" onkeydown="if(event.keyCode===13)window._addCat()">'+
      '<button class="btn btn-p btn-sm" onclick="window._addCat()" style="flex-shrink:0;padding:9px 14px">+ Добавить</button>'+
    '</div>'+
    '<div id="catsListWrap">'+renderCatsList()+'</div>'+
    '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:#334155">'+
      'Нельзя удалить категорию, в которой есть блюда. Удалите или перенесите блюда сначала.'+
    '</div>'
  );
  setTimeout(function(){var el=document.getElementById('newCatInp');if(el)el.focus();},100);

  window._addCat=function(){
    var inp=document.getElementById('newCatInp');
    if(!inp)return;
    var val=inp.value.trim();
    if(!val){showToast('Введите название','err');return;}
    var cats=getCats();
    if(cats.some(function(c){return c.toLowerCase()===val.toLowerCase();})){
      showToast('Такая категория уже есть','err');return;
    }
    cats.push(val);
    saveCats(cats);
    inp.value='';
    refreshList();
    showToast('Категория добавлена');
  };

  window._startCatEdit=function(idx){
    document.getElementById('catview'+idx).style.display='none';
    document.getElementById('catedit'+idx).style.display='flex';
    document.getElementById('catbtn_edit'+idx).textContent='✓';
    document.getElementById('catbtn_edit'+idx).onclick=function(){window._saveCatEdit(idx);};
    var inp=document.getElementById('catinp'+idx);
    if(inp){inp.focus();inp.select();}
  };

  window._saveCatEdit=function(idx){
    var inp=document.getElementById('catinp'+idx);
    if(!inp)return;
    var val=inp.value.trim();
    if(!val){showToast('Название не может быть пустым','err');return;}
    var cats=getCats();
    var oldName=cats[idx];
    // Check duplicate (except self)
    if(cats.some(function(c,i){return i!==idx&&c.toLowerCase()===val.toLowerCase();})){
      showToast('Такая категория уже есть','err');return;
    }
    // Rename in all TTK
    if(oldName!==val){
      DB.ttk.forEach(function(t){if(t.category===oldName)t.category=val;});
      scheduleSave(['ttk']);
    }
    cats[idx]=val;
    saveCats(cats);
    refreshList();
    renderTab('ttk');
    showToast('Категория переименована');
  };

  window._moveCat=function(idx,dir){
    var cats=getCats();
    var newIdx=idx+dir;
    if(newIdx<0||newIdx>=cats.length)return;
    var tmp=cats[idx];cats[idx]=cats[newIdx];cats[newIdx]=tmp;
    saveCats(cats);
    refreshList();
  };

  window._deleteCat=function(idx){
    var cats=getCats();
    var cat=cats[idx];
    var inUse=DB.ttk.some(function(t){return t.category===cat;});
    if(inUse){showToast('Сначала удалите все ТТК этой категории','err');return;}
    cats.splice(idx,1);
    saveCats(cats);
    refreshList();
    renderTab('ttk');
    showToast('Категория удалена');
  };
};

function genTTKId(){
  // FIX-5: проверяем уникальность — если артикул уже занят, инкрементируем дальше
  var nums=DB.ttk.map(function(t){var m=(t.id||'').match(/(\d+)$/);return m?parseInt(m[1]):0;});
  var max=nums.length?Math.max.apply(null,nums):0;
  var n=max+1;
  var candidate='ТТК'+(n<10?'00':n<100?'0':'')+n;
  // гарантия уникальности на случай ручного изменения артикулов
  while(DB.ttk.some(function(t){return t.id===candidate;})){
    n++;candidate='ТТК'+(n<10?'00':n<100?'0':'')+n;
  }
  return candidate;
}

function openTTKModal(id){
  var t=id?JSON.parse(JSON.stringify(findTTK(id)||{})):{id:genTTKId(),name:'',category:getTTKCats()[0]||'Горячие блюда',yield:0,menuPrice:0,ingredients:[]};
  var isNew=!id;
  window._ettk=t;
  var cats=getTTKCats();

  window._calcIngCostVal=function(ing){
    var p=findP(ing.pid);if(!p||!ing.weight)return 0;
    var coef=(ing.coef!=null&&ing.coef!=='')?Number(ing.coef):1;
    if(coef<=0)coef=1;
    var qty=ing.weight*coef;
    if(p.unit==='кг'||p.unit==='л')qty=qty/1000;
    return p.cost*qty;
  };
  window._updateTTKCostDisplay=function(){
    var tc=window._ettk.ingredients.reduce(function(s,ing){return s+window._calcIngCostVal(ing);},0);
    var el=document.getElementById('ttkTotalCost');if(el)el.textContent=fmt(tc,0)+' ₸';
    var mp=window._ettk.menuPrice||0;
    var pct=mp>0?((mp-tc)/mp*100):0;
    var mel=document.getElementById('ttkMarginPct');
    if(mel){mel.textContent=fmtP(pct);mel.style.color=pct>=60?'#4ade80':pct>=40?'#facc15':'#ef4444';}
    // auto-yield
    if(!window._ettk._yieldManual){
      var tw=window._ettk.ingredients.reduce(function(s,ing){return s+(parseFloat(ing.weight)||0);},0);
      var yel=document.getElementById('ttkYield');if(yel&&tw>0)yel.value=Math.round(tw);
    }
    // per-ingredient cost labels
    window._ettk.ingredients.forEach(function(ing,i){
      var cel=document.getElementById('ingcl'+i);
      if(cel){var c=window._calcIngCostVal(ing);cel.textContent=c>0?fmt(c,0)+' ₸':'—';}
    });
  };
  window._ingField=function(i,field,raw){
    if(!window._ettk.ingredients[i])return;
    window._ettk.ingredients[i][field]=parseFloat((raw||'0').replace(',','.'))||0;
    window._updateTTKCostDisplay();
  };
  window._ingSelectChange=function(i,sel){
    window._ettk.ingredients[i].pid=sel.value;
    window._ettk.ingredients[i].name=sel.options[sel.selectedIndex].text.split('(')[0].trim();
    window._updateTTKCostDisplay();
  };

  // ── Autocomplete for ingredient search ──
  var _acDrop=null, _acIdx=null, _acBlurTimer=null;

  function _ingAcRemoveDrop(){
    if(_acDrop){_acDrop.remove();_acDrop=null;_acIdx=null;}
  }

  window._ingAcBlur=function(i){
    // delay so click on drop item fires first
    _acBlurTimer=setTimeout(function(){
      _ingAcRemoveDrop();
      // restore to saved name if nothing selected properly
      var ing=window._ettk.ingredients[i];
      var el=document.getElementById('ing-ac-'+i);
      if(el&&ing){el.value=ing.name||'';}
    },200);
  };

  window._ingAcSearch=function(i,input){
    clearTimeout(_acBlurTimer);
    _ingAcRemoveDrop();
    var q=(input.value||'').toLowerCase().trim();
    var matches=DB.products.filter(function(p){return q===''||p.name.toLowerCase().indexOf(q)>=0;}).slice(0,30);
    if(!matches.length){
      var d=document.createElement('div');
      d.className='ing-ac-drop';
      d.innerHTML='<div class="ing-ac-empty">Не найдено</div>';
      _positionDrop(d,input);
      document.body.appendChild(d);
      _acDrop=d;
      return;
    }
    var d=document.createElement('div');
    d.className='ing-ac-drop';
    d.innerHTML=matches.map(function(p){
      var pid=p.id;
      return '<div class="ing-ac-item" onmousedown="_ingAcPick('+i+',\''+pid+'\')">'+
        '<span class="ing-ac-item-name">'+esc(p.name)+'</span>'+
        '<span class="ing-ac-item-unit">'+p.unit+'</span>'+
      '</div>';
    }).join('');
    _positionDrop(d,input);
    document.body.appendChild(d);
    _acDrop=d;
  };

  function _positionDrop(d,input){
    var r=input.getBoundingClientRect();
    d.style.top=(r.bottom+4)+'px';
    d.style.left=r.left+'px';
    d.style.width=Math.max(r.width,200)+'px';
    // flip up if near bottom
    var spaceBelow=window.innerHeight-r.bottom;
    if(spaceBelow<220){
      d.style.top='';
      d.style.bottom=(window.innerHeight-r.top+4)+'px';
    }
  }

  window._ingAcPick=function(i,pid){
    clearTimeout(_acBlurTimer);
    var p=findP(pid);if(!p)return;
    window._ettk.ingredients[i].pid=p.id;
    window._ettk.ingredients[i].name=p.name;
    var el=document.getElementById('ing-ac-'+i);
    if(el){el.value=p.name;el.classList.add('selected');}
    _ingAcRemoveDrop();
    window._updateTTKCostDisplay();
  };

  function ingRowHTML(ing,i){
    var ic=window._calcIngCostVal(ing);
    var displayName=ing.name||(ing.pid?(findP(ing.pid)||{}).name||'':'');
    var selClass=ing.pid?'ing-ac-input selected':'ing-ac-input';
    var html='<div class="ing-row" id="ir'+i+'">';
    html+='<div class="ing-ac-wrap">';
    html+='<input class="'+selClass+'" id="ing-ac-'+i+'" autocomplete="off" placeholder="Поиск товара..." value="'+esc(displayName)+'"';
    html+=' oninput="_ingAcSearch('+i+',this)"';
    html+=' onfocus="_ingAcSearch('+i+',this)"';
    html+=' onblur="_ingAcBlur('+i+')">';
    html+='</div>';
    html+='<input class="inp" type="text" inputmode="decimal" style="font-size:12px;padding:7px;text-align:center" placeholder="Вес(г)" value="'+(ing.weight||'')+'" onblur="_ingField('+i+String.fromCharCode(44)+"'weight'"+String.fromCharCode(44)+'this.value)">';
    html+='<input class="inp" type="text" inputmode="decimal" style="font-size:12px;padding:7px;text-align:center" placeholder="1" value="'+(ing.coef!=null?ing.coef:1)+'" onblur="_ingField('+i+String.fromCharCode(44)+"'coef'"+String.fromCharCode(44)+'this.value)">';
    html+='<span id="ingcl'+i+'" style="font-size:11px;color:#6366f1;text-align:right;padding:0 4px;white-space:nowrap">'+(ic>0?fmt(ic,0)+' ₸':'—')+'</span>';
    html+='<button onclick="delIng('+i+')" style="background:none;border:none;color:#475569;cursor:pointer;font-size:16px;padding:0">×</button>';
    html+='</div>';
    return html;
  }
  window._rebuildIng=function(){
    var l=document.getElementById('ingList');if(l)l.innerHTML=window._ettk.ingredients.map(ingRowHTML).join('');
    window._updateTTKCostDisplay();
  };

  var tc=calcTTKCost(t);var mp=t.menuPrice||0;var mpct=mp>0?((mp-tc)/mp*100):0;
  openModal(
    '<button class="modal-close" onclick="closeModal()">✕</button>'+
    '<div class="modal-title">'+(isNew?'Новая ТТК':'Редактировать ТТК')+'</div>'+
    '<div class="fr">'+
      '<div><label class="lbl">Артикул</label><input class="inp" value="'+t.id+'" onblur="window._ettk.id=this.value"></div>'+
      '<div><label class="lbl">Категория</label><select class="inp" onchange="window._ettk.category=this.value">'+cats.map(function(c){return'<option'+(c===t.category?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>'+
    '</div>'+
    '<div class="fw"><label class="lbl">Название</label><input class="inp" value="'+t.name+'" onblur="window._ettk.name=this.value" oninput="window._ettk.name=this.value;markModalDirty()" placeholder="Название блюда"></div>'+
    '<div class="fr">'+
      '<div><label class="lbl">Выход (г/мл)</label><input id="ttkYield" class="inp" type="text" inputmode="decimal" value="'+t.yield+'" oninput="window._ettk.yield=parseFloat(this.value.replace(\',\',\'.\'))||0;window._ettk._yieldManual=true" onblur="window._ettk.yield=parseFloat(this.value.replace(\',\',\'.\'))||0;window._ettk._yieldManual=true"></div>'+
      '<div><label class="lbl">Цена меню ₸</label><input id="ttkMenuPrice" class="inp" type="text" inputmode="decimal" value="'+t.menuPrice+'" onblur="window._ettk.menuPrice=parseFloat(this.value.replace(\',\',\'.\'))||0;window._updateTTKCostDisplay()"></div>'+
    '</div>'+
    '<div style="background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">'+
      '<div><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">Себестоимость</div>'+
        '<div id="ttkTotalCost" style="font-size:18px;font-weight:800;color:#6366f1">'+fmt(tc,0)+' ₸</div></div>'+
      '<div style="text-align:right"><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">Маржа</div>'+
        '<div id="ttkMarginPct" style="font-size:18px;font-weight:800;color:'+(mpct>=60?'#4ade80':mpct>=40?'#facc15':'#ef4444')+'">'+fmtP(mpct)+'</div></div>'+
    '</div>'+
    '<div class="sec-ttl">Ингредиенты</div>'+
    '<div style="display:grid;grid-template-columns:1.8fr 0.9fr 0.7fr 0.9fr 28px;gap:5px;margin-bottom:5px">'+
      ['Продукт','Вес(г)','Коэф.','С/С',''].map(function(h){return'<div style="font-size:9px;color:#475569;text-transform:uppercase;font-weight:700">'+h+'</div>';}).join('')+
    '</div>'+
    '<div id="ingList">'+t.ingredients.map(ingRowHTML).join('')+'</div>'+
    '<button class="btn btn-g btn-sm" onclick="addIng()" style="margin-bottom:14px;width:auto">+ Ингредиент</button>'+
    '<div style="display:flex;gap:8px">'+
      '<button class="btn btn-p" onclick="saveTTK('+(isNew?1:0)+')">Сохранить</button>'+
      (!isNew?'<button class="btn btn-b btn-sm" onclick="dupTTK(\''+t.id+'\')">Копировать</button>':'')+
      (!isNew?'<button class="btn btn-r btn-sm" onclick="delTTK(\''+t.id+'\')">Удалить</button>':'')+
      '<button class="btn btn-g btn-sm" onclick="closeModal()">Отмена</button>'+
    '</div>'
  );
}
window.addIng=function(){
  // Добавляем пустой ингредиент без предвыбора — пользователь сам выберет через поиск
  window._ettk.ingredients.push({pid:'',name:'',weight:0,coef:1});
  window._rebuildIng();
  // Фокус на новое поле поиска
  setTimeout(function(){
    var idx=window._ettk.ingredients.length-1;
    var el=document.getElementById('ing-ac-'+idx);
    if(el)el.focus();
  },50);
};
window.delIng=function(i){window._ettk.ingredients.splice(i,1);window._rebuildIng();};
window.saveTTK=function(isNew){if(!isOwner()){showToast('Нет доступа','err');return;}
  isNew=!!isNew;
  var t=window._ettk;
  if(!t.name.trim()){showToast('Укажите название','err');return;}
  // Проверка дубля имени ТТК (регистронезависимо)
  var nameLower=t.name.trim().toLowerCase();
  var dupName=DB.ttk.find(function(x){return x.name.toLowerCase()===nameLower&&x.id!==t.id;});
  if(dupName){showToast('ТТК «'+dupName.name+'» уже существует','err');return;}
  // Проверка дубля артикула
  var dupId=DB.ttk.find(function(x){return x.id===t.id&&(isNew||(DB.ttk.findIndex(function(y){return y.id===t.id;})!==DB.ttk.findIndex(function(y){return y===x;})));});
  if(isNew&&DB.ttk.find(function(x){return x.id===t.id;})){showToast('Артикул '+t.id+' уже существует','err');return;}
  // FIX-3: проверяем что у каждого ингредиента выбран товар
  var badIng=t.ingredients.findIndex(function(ing){return !ing.pid;});
  if(badIng>=0){showToast('Выберите товар для ингредиента '+(badIng+1),'err');return;}
  if(isNew)DB.ttk.push(t);
  else{var idx=DB.ttk.findIndex(function(x){return x.id===t.id;});if(idx>=0)DB.ttk[idx]=t;}
  // FIX-10/11: обновляем индекс и сбрасываем кэш
  rebuildIndexes();invalidateTTKCostCache();
  _forceCloseModal();scheduleSave(['ttk']);showToast(isNew?'ТТК создана':'ТТК обновлена');renderTab('ttk');
};
window.dupTTK=function(id){
  var src=findTTK(id);if(!src)return;
  var copy=JSON.parse(JSON.stringify(src));
  copy.id=genTTKId();
  copy.name=src.name+' (копия)';
  DB.ttk.push(copy);
  _forceCloseModal();scheduleSave(['ttk']);showToast('ТТК скопирована');renderTab('ttk');
};
window.delTTK=function(id){if(!isOwner()){showToast('Нет доступа','err');return;}
  var t=findTTK(id);
  openConfirm(
    'Удалить ТТК «'+(t?esc(t.name):id)+'»?',
    'Это действие нельзя отменить.',
    function(){
      trashAdd('ttk','ТТК: '+(t?t.name:id), (t?t.category+' · '+t.ingredients.length+' ингр.':''), t||{id:id});
      DB.ttk=DB.ttk.filter(function(x){return x.id!==id;});
      rebuildIndexes();invalidateTTKCostCache();
      _forceCloseModal();scheduleSave(['ttk']);showToast('ТТК удалена — можно восстановить в корзине');renderTab('ttk');
    }
  );
};

function renderSalesAnalytContent(){
  // FIX-9: используем глобальные MONTH_FULL, pad2, buildBaseYears
  var curYm=toCurYm();
  if(!_analytYm)_analytYm=curYm;
  var selY=_analytYm.slice(0,4);
  var selM=_analytYm.slice(5,7);

  var isCurAnalyt=_analytYm===curYm;
  var filterBar='<div class="fbar" style="margin-bottom:14px">'+
    '<select class="inp fbar-sel" style="flex:0 0 auto;width:90px;cursor:pointer" onchange="setAnalytYear(this.value)">'+

    '</select>'+
    '<select class="inp fbar-sel" style="flex:1;cursor:pointer" onchange="setAnalytMonth(this.value)">'+

    '</select>'+
    (!isCurAnalyt?'<button class="fbar-cfg" onclick="resetAnalytToday()" title="Текущий месяц" style="font-size:11px;font-weight:700;color:#6366f1;border-color:rgba(99,102,241,.3)">↺</button>':'')+
  '</div>';

  if(!filtSales.length)return filterBar+'<div class="empty"><div class="empty-text">Нет продаж за '+MONTH_FULL[parseInt(selM)-1]+' '+selY+'</div></div>';

  var totalRev=filtSales.reduce(function(s,sale){return s+sale.items.reduce(function(a,si){return a+si.price*si.qty;},0);},0);
  var totalCogs=filtSales.reduce(function(s,sale){return s+sale.items.reduce(function(a,si){var t=findTTK(si.ttkId);return a+(t?calcTTKCost(t)*si.qty:0);},0);},0);
  var totalProfit=totalRev-totalCogs;
  var fc=totalRev>0?(totalCogs/totalRev)*100:0;

  var dayMap={};

    if(!dayMap[sale.date])dayMap[sale.date]={rev:0,cogs:0};
    sale.items.forEach(function(si){
      dayMap[sale.date].rev+=si.price*si.qty;
      var t=findTTK(si.ttkId);
      dayMap[sale.date].cogs+=t?calcTTKCost(t)*si.qty:0;

    dishMap[si.ttkId].qty+=si.qty;
    dishMap[si.ttkId].rev+=si.qty*si.price;
    dishMap[si.ttkId].cogs+=t?calcTTKCost(t)*si.qty:0;

  var dishes=Object.values(dishMap).sort(function(a,b){return b.rev-a.rev;});

  var html=filterBar;

    '<div class="kpi"><div class="kpi-val" style="color:#4ade80">'+fmt(totalRev)+'</div><div class="kpi-lbl">Выручка ₸</div></div>'+
    '<div class="kpi"><div class="kpi-val" style="color:#ef4444">'+fmt(totalCogs)+'</div><div class="kpi-lbl">Себестоимость ₸</div></div>'+
  '</div>'+
  '<div class="g2" style="margin-bottom:12px">'+
    '<div class="kpi"><div class="kpi-val" style="color:#6366f1">'+fmt(totalProfit)+'</div><div class="kpi-lbl">Прибыль ₸</div></div>'+
    '<div class="kpi"><div class="kpi-val" style="color:'+(fc<=35?'#4ade80':fc<=50?'#facc15':'#ef4444')+'">'+fmtP(fc)+'</div><div class="kpi-lbl">Фудкост</div></div>'+
  '</div>';

  // Daily chart
  html+='<div class="cd"><div class="cd-title">Выручка по дням — '+MONTH_FULL[parseInt(selM)-1]+' '+selY+'</div>'+
    renderBarChart(revDays,'#4ade80')+
    '<div style="margin-top:10px">'+
      dayKeys.map(function(dk){
        var d=dayMap[dk];
        return '<div class="list-row"><div class="row-top"><span style="font-weight:600">'+dk+'</span><span style="color:#4ade80;font-weight:700">'+fmt(d.rev)+' ₸</span></div>'+
          '<div class="row-meta">с/с <span style="color:#ef4444">'+fmt(d.cogs,0)+' ₸</span> · прибыль <span style="color:#6366f1">'+fmt(d.rev-d.cogs,0)+' ₸</span></div></div>';
      }).join('')+
    '</div>'+
  '</div>';

  // Per-dish table
  html+='<div class="cd"><div class="cd-title">По блюдам</div>'+
    '<div style="display:grid;grid-template-columns:2fr 0.7fr 1fr 1fr;gap:6px;margin-bottom:8px">'+
    ['Блюдо','Порц','Выручка','Прибыль'].map(function(h){return'<div style="font-size:9px;color:#475569;text-transform:uppercase;font-weight:700">'+h+'</div>';}).join('')+'</div>'+

      '<div style="font-weight:600">'+d.name+'</div>'+
      '<div style="color:#94a3b8">'+fmt(d.qty)+'</div>'+
      '<div style="color:#4ade80;font-weight:600">'+fmt(d.rev)+' ₸</div>'+
      '<div style="color:#6366f1;font-weight:600">'+fmt(d.rev-d.cogs,0)+' ₸</div>'+
    '</div>';}).join('')+
  '</div>';

  return html;
}

function renderABCContent(){
  // FIX-9: используем глобальные MONTH_FULL, pad2, buildBaseYears
  var curYm=toCurYm();
  if(!_abcYm)_abcYm=curYm;
  var isAll=_abcYm==='__all__';
  var selY=isAll?'':_abcYm.slice(0,4);
  var selM=isAll?'':_abcYm.slice(5,7);
  var baseYears=buildBaseYears(isAll?'':selY);

  var filterBar='<div class="fbar" style="margin-bottom:14px">'+
    '<select class="inp fbar-sel" style="flex:0 0 auto;width:90px;cursor:pointer" onchange="setAbcYear(this.value)">'+
      baseYears.map(function(y){return'<option value="'+y+'"'+(y===selY?' selected':'')+'>'+y+'</option>';}).join('')+
    '</select>'+
    '<select class="inp fbar-sel" style="flex:1;cursor:pointer" onchange="setAbcMonth(this.value)">'+
      MONTH_FULL.map(function(mn,i){var mv=pad2(i+1);return'<option value="'+mv+'"'+(mv===selM?' selected':'')+'>'+mn+'</option>';}).join('')+
    '</select>'+
    '<button onclick="setAbcAll()" style="flex-shrink:0;padding:0 10px;height:36px;border-radius:10px;border:1px solid '+(isAll?'#6366f1':'rgba(255,255,255,.07)')+';background:'+(isAll?'rgba(99,102,241,.15)':'rgba(255,255,255,.04)')+';color:'+(isAll?'#6366f1':'#64748b')+';font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap">Всё время</button>'+
  '</div>';

  var srcSales=isAll?DB.sales:DB.sales.filter(function(s){return s.date.startsWith(_abcYm);});
  var dishMap={};
  srcSales.forEach(function(sale){sale.items.forEach(function(si){
    if(!dishMap[si.ttkId])dishMap[si.ttkId]={name:si.name,qty:0,rev:0,profit:0};
    var t=findTTK(si.ttkId);var cost=t?calcTTKCost(t)*si.qty:0;
    dishMap[si.ttkId].qty+=si.qty;dishMap[si.ttkId].rev+=si.qty*si.price;dishMap[si.ttkId].profit+=si.qty*si.price-cost;
  });});
  var dishes=Object.values(dishMap).sort(function(a,b){return b.rev-a.rev;});
  if(!dishes.length)return filterBar+'<div class="empty"><div class="empty-text">Нет данных продаж'+(isAll?'':' за '+MONTH_FULL[parseInt(selM)-1]+' '+selY)+'</div></div>';
  var totalRev=dishes.reduce(function(s,d){return s+d.rev;},0);
  var cum=0;
  dishes.forEach(function(d){cum+=d.rev;d._cum=totalRev>0?cum/totalRev:0;d.abc=d._cum<=0.7?'A':d._cum<=0.9?'B':'C';});
  var counts={A:0,B:0,C:0};dishes.forEach(function(d){counts[d.abc]++;});
  // Показываем KPI только для категорий с блюдами
  var kpiItems=['A','B','C'].filter(function(c){return counts[c]>0;});
  return filterBar+
    '<div class="g3">'+kpiItems.map(function(c){return'<div class="kpi"><div class="kpi-val" style="color:'+(c==='A'?'#4ade80':c==='B'?'#facc15':'#94a3b8')+'">'+counts[c]+'</div><div class="kpi-lbl">Катег. '+c+'</div></div>';}).join('')+'</div>'+

window.onPriceSearch=function(v){

    var key=item.name;if(!phMap[key])phMap[key]=[];

var _stockSearch='';
var _stockCollapsed={};

window.onStockSearchInput=function(el){var v=el.value;_stockSearch=v;_showStockDrop(el,v);};
window.onStockSearchFocus=function(el){if(el.value)_showStockDrop(el,el.value);};
window.onStockSearchBlur=function(){setTimeout(function(){var d=document.getElementById('stockAcDrop');if(d)d.style.display='none';},200);};

function _getStockProductRow(x){

function _showStockDrop(el,v){
  var d=document.getElementById('stockAcDrop');
  if(!d)return;
  var q=(v||'').toLowerCase().trim();
  _updateStockList(q);
  if(!q){d.style.display='none';return;}
  var matches=DB.products.filter(function(p){return p.name.toLowerCase().includes(q);});
  if(!matches.length){d.style.display='none';return;}
  d.innerHTML=matches.slice(0,25).map(function(p){
    var st=stockStatus(p);
    var col=st==='ok'?'#4ade80':st==='low'?'#facc15':'#ef4444';
    return '<div class="stock-ac-item" onmousedown="pickStockAcItem(\''+p.id+'\')">'+
      '<span class="stock-ac-item-name">'+esc(p.name)+'</span>'+
      '<span class="stock-ac-item-meta" style="color:'+col+'">'+fmt(p.qty,2)+' '+p.unit+'</span>'+
    '</div>';
  }).join('');
  d.style.display='block';
}

function _buildStockGroups(sorted){
  var supplierMap={'Общее':[]};
  DB.suppliers.forEach(function(s){supplierMap[s]=[];});
  sorted.forEach(function(x){
    var grp=x.p.supplier&&supplierMap[x.p.supplier]?x.p.supplier:'Общее';
    supplierMap[grp].push(x);
  });
  var groups=Object.keys(supplierMap).filter(function(k){return supplierMap[k].length>0;});
  var html='';
  groups.forEach(function(grp){
    var safeId=btoa(unescape(encodeURIComponent(grp))).replace(/[^a-zA-Z0-9]/g,'_');
    var collapsed=!!_stockCollapsed[grp];
    var cnt=supplierMap[grp].length;
    var grpVal=supplierMap[grp].reduce(function(s,x){return s+Math.max(0,x.p.qty)*x.p.cost;},0);
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;cursor:pointer;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.06)" onclick="toggleStockGroup(\''+grp.replace(/'/g,"\\'")+'\')">'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<svg id="sga_'+safeId+'" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="transition:.2s;transform:'+(collapsed?'rotate(-90deg)':'rotate(0deg)')+'"><path d="M6 9l6 6 6-6"/></svg>'+
        '<span style="font-size:12px;font-weight:700;color:#e2e8f0">'+grp+'</span>'+
        '<span style="font-size:10px;color:#64748b">('+cnt+')</span>'+
      '</div>'+
      '<span style="font-size:11px;color:#6366f1;font-weight:600">'+fmt(grpVal)+' ₸</span>'+
    '</div>'+
    '<div id="sg_'+safeId+'" style="display:'+(collapsed?'none':'block')+';margin-bottom:8px">'+
      '<div class="cd">'+supplierMap[grp].map(_getStockProductRow).join('')+'</div>'+
    '</div>';
  });
  return groups.length?html:'<div class="empty"><div class="empty-text">Нет товаров</div></div>';
}

function _updateStockList(q){
  var listEl=document.getElementById('stockListArea');
  if(!listEl)return;
  var filtered=q?DB.products.filter(function(p){return p.name.toLowerCase().includes(q);}):DB.products;
  var withStatus=filtered.map(function(p){return{p:p,st:stockStatus(p)};});
  var sorted=withStatus.slice().sort(function(a,b){var o={def:0,low:1,ok:2};return o[a.st]-o[b.st];});
  if(q){
    listEl.innerHTML='<div class="cd">'+(sorted.length?sorted.map(_getStockProductRow).join(''):'<div class="empty"><div class="empty-text">Не найдено</div></div>')+'</div>';
  }else{
    listEl.innerHTML=_buildStockGroups(sorted);
  }
}

window.pickStockAcItem=function(pid){
  if(pid==='_clear_'){
    _stockSearch='';
    var inp=document.getElementById('stockSearchInput');
    if(inp){inp.value='';inp.focus();}
    var d=document.getElementById('stockAcDrop');
    if(d)d.style.display='none';
    _updateStockList('');
    return;
  }
  var p=findP(pid);if(!p)return;
  var inp=document.getElementById('stockSearchInput');
  if(inp){inp.value=p.name;inp.focus();}
  _stockSearch=p.name;
  var d=document.getElementById('stockAcDrop');
  if(d)d.style.display='none';
  _updateStockList(p.name.toLowerCase());
};
window.toggleStockGroup=function(grp){
  _stockCollapsed[grp]=!_stockCollapsed[grp];
  // FIX-20: safeId вычисляется один раз — не повторяем btoa дважды
  var safeId=btoa(unescape(encodeURIComponent(grp))).replace(/[^a-zA-Z0-9]/g,'_');
  var body=document.getElementById('sg_'+safeId);
  var arrow=document.getElementById('sga_'+safeId);
  if(body)body.style.display=_stockCollapsed[grp]?'none':'block';
  if(arrow)arrow.style.transform=_stockCollapsed[grp]?'rotate(-90deg)':'rotate(0deg)';
};
function renderStock(){
  var totalVal=DB.products.reduce(function(s,p){return s+Math.max(0,p.qty)*p.cost;},0);
  var q=_stockSearch.toLowerCase().trim();
  var filtered=q?DB.products.filter(function(p){return p.name.toLowerCase().includes(q);}):DB.products;

  // FIX-12: кэшируем stockStatus для сортировки — не вызываем дважды
  var withStatus=filtered.map(function(p){return{p:p,st:stockStatus(p)};});
  var sorted=withStatus.slice().sort(function(a,b){var o={def:0,low:1,ok:2};return o[a.st]-o[b.st];});

  // Group by supplier
  var supplierMap={'Общее':[]};
  DB.suppliers.forEach(function(s){supplierMap[s]=[];});
  sorted.forEach(function(x){
    var grp=x.p.supplier&&supplierMap[x.p.supplier]?x.p.supplier:'Общее';
    supplierMap[grp].push(x);
  });
  var groups=Object.keys(supplierMap).filter(function(k){return supplierMap[k].length>0;});

  var listHtml='';
  if(q){
    listHtml='<div class="cd">'+(sorted.length?sorted.map(_getStockProductRow).join(''):'<div class="empty"><div class="empty-text">Не найдено</div></div>')+'</div>';
  }else{
    groups.forEach(function(grp){
      // FIX-20: safeId вычисляется один раз на группу
      var safeId=btoa(unescape(encodeURIComponent(grp))).replace(/[^a-zA-Z0-9]/g,'_');
      var collapsed=!!_stockCollapsed[grp];
      // FIX-2: Math.max(0, qty) — группа не показывает отрицательную стоимость
      var grpVal=supplierMap[grp].reduce(function(s,x){return s+Math.max(0,x.p.qty)*x.p.cost;},0);
      var cnt=supplierMap[grp].length;
      listHtml+=
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;cursor:pointer;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.06)" onclick="toggleStockGroup(\''+grp.replace(/'/g,"\\'")+'\')">' +
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<svg id="sga_'+safeId+'" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="transition:.2s;transform:'+(collapsed?'rotate(-90deg)':'rotate(0deg)')+'"><path d="M6 9l6 6 6-6"/></svg>'+
            '<span style="font-size:12px;font-weight:700;color:#e2e8f0">'+grp+'</span>'+
            '<span style="font-size:10px;color:#64748b">('+cnt+')</span>'+
          '</div>'+
          '<span style="font-size:11px;color:#6366f1;font-weight:600">'+fmt(grpVal)+' ₸</span>'+
        '</div>'+
        '<div id="sg_'+safeId+'" style="display:'+(collapsed?'none':'block')+';margin-bottom:8px">'+
          '<div class="cd">'+supplierMap[grp].map(_getStockProductRow).join('')+'</div>'+
        '</div>';
    });
    if(!groups.length)listHtml='<div class="empty"><div class="empty-text">Нет товаров</div></div>';
  }

  return '<div class="g2" style="margin-bottom:10px">'+
    '<div class="kpi"><div class="kpi-val">'+DB.products.length+'</div><div class="kpi-lbl">Позиций</div></div>'+
    '<div class="kpi"><div class="kpi-val" style="color:#6366f1">'+fmt(totalVal)+'</div><div class="kpi-lbl">Стоимость ₸</div></div>'+
    '</div>'+
    '<button class="btn btn-p" onclick="openProductModal(null)" style="margin-bottom:12px">'+
      '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'+
      'Добавить товар'+
    '</button>'+
    '<div style="margin-bottom:12px">'+
      '<input id="stockSearchInput" class="inp" placeholder="Поиск товара..." value="'+esc(_stockSearch)+'" autocomplete="off" oninput="onStockSearchInput(this)" onfocus="onStockSearchFocus(this)" onblur="onStockSearchBlur()" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}" style="padding-right:'+(_stockSearch?'36px':'12px')+'">'+
      (_stockSearch?'<button onmousedown="pickStockAcItem(\'_clear_\')" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;font-size:18px;cursor:pointer;line-height:1;padding:0 4px;z-index:2">×</button>':'')+
      '<div id="stockAcDrop" class="stock-ac-drop" style="display:none"></div>'+
    '</div>'+
    '<div id="stockListArea">'+listHtml+'</div>';
}
function openProductModal(id){

  var infoBox=isNew
    ?'<div style="background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.18);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#7dd3fc;line-height:1.55"><strong style="display:block;margin-bottom:3px">Прямое добавление товара</strong>Используйте для начального заполнения склада. Цена — себестоимость за единицу, остаток — начальный запас.</div>'

  html+='<div style="flex:1"><label class="lbl">Нач. остаток</label><input id="pq" class="inp" type="text" inputmode="decimal" value="'+(p.qty||0)+'" placeholder="0"></div>';
  html+='</div>';
  html+='<div class="fr">';
  html+='<div style="flex:1"><label class="lbl">Цена ₸ / ед</label><input id="pc" class="inp" type="text" inputmode="decimal" value="'+(p.cost||0)+'" placeholder="0"></div>';
  html+='<div style="flex:1"><label class="lbl">Мин. остаток</label><input id="pm" class="inp" type="text" inputmode="decimal" value="'+(p.minQty||0)+'" placeholder="0"></div>';
  html+='</div>';
  html+='<div class="fw"><label class="lbl">Поставщик</label><select id="ps" class="inp">'+supplierOpts+'</select></div>';
  html+='<div style="display:flex;gap:8px;margin-top:4px">';
  html+='<button class="btn btn-p" onclick="saveProduct(\''+pid+'\','+(isNew?1:0)+')">';
  html+='<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
  html+=(isNew?'Добавить товар':'Сохранить');
  html+='</button>';
  if(!isNew)html+='<button class="btn btn-b btn-sm" onclick="openPriceHistory(\''+pid+'\')">📈</button>';
  if(!isNew)html+='<button class="btn btn-r btn-sm" onclick="delProduct(\''+pid+'\')">Удалить</button>';
  html+='<button class="btn btn-g btn-sm" onclick="closeModal()">Отмена</button>';
  html+='</div>';
  openModal(html);
}

window.saveProduct=function(id,isNew){if(!isOwner()){showToast('Нет доступа','err');return;}
  isNew=!!isNew;
  var name=document.getElementById('pn').value.trim();
  if(!name){showToast('Укажите название','err');return;}
  // Проверка дубля по имени (регистронезависимая)
  var nameLower=name.toLowerCase();
  var duplicate=DB.products.find(function(x){
    return x.name.toLowerCase()===nameLower && x.id!==id;
  });
  if(duplicate){
    showToast('Товар «'+duplicate.name+'» уже существует','err');
    // Подсвечиваем поле названия
    var pnEl=document.getElementById('pn');
    if(pnEl){pnEl.style.borderColor='#ef4444';pnEl.style.boxShadow='0 0 0 3px rgba(239,68,68,.15)';setTimeout(function(){pnEl.style.borderColor='';pnEl.style.boxShadow='';},2000);}
    return;
  }
  var existing=findP(id);
  var ps=document.getElementById('ps');
  var p={id:id,name:name,unit:document.getElementById('pu').value,qty:parseFloat(document.getElementById('pq').value)||0,cost:parseFloat(document.getElementById('pc').value)||0,minQty:parseFloat(document.getElementById('pm').value)||0,supplier:ps?ps.value:(existing&&existing.supplier)||''};
  if(isNew)DB.products.push(p);
  else{var idx=DB.products.findIndex(function(x){return x.id===id;});if(idx>=0)DB.products[idx]=p;}
  // FIX-11/10: немедленно перестраиваем индексы и сбрасываем кэш стоимости
  rebuildIndexes();invalidateTTKCostCache();
  _forceCloseModal();scheduleSave(['products']);showToast(isNew?'Товар добавлен':'Товар обновлён');renderTab('stock');
};
window.delProduct=function(id){if(!isOwner()){showToast('Нет доступа','err');return;}
  var p=findP(id);
  openConfirm(
    'Удалить товар «'+(p?esc(p.name):id)+'»?',
    'Это действие нельзя отменить.',
    function(){
      trashAdd('product','Товар: '+(p?p.name:id), (p?p.unit+' · остаток '+p.qty:''), p||{id:id});
      DB.products=DB.products.filter(function(x){return x.id!==id;});
      rebuildIndexes();invalidateTTKCostCache();
      _forceCloseModal();scheduleSave(['products']);showToast('Товар удалён — можно восстановить в корзине');renderTab('stock');
    }
  );
};

window.showIncSugg=function(idx){
  var box=document.getElementById('incSugg'+idx);if(!box)return;
  var q=(_incForm.items[idx]&&_incForm.items[idx].name||'').toLowerCase().trim();
  var all=q?DB.products.filter(function(p){return p.name.toLowerCase().includes(q);}):DB.products;
  if(!all.length){box.style.display='none';return;}
  box.innerHTML=all.map(function(p){return'<div class="sugg-item" onmousedown="pickIncItem('+idx+',\''+p.id+'\')"><span style="font-size:12px;font-weight:600">'+p.name+'</span><span style="font-size:11px;color:#6366f1">'+fmt(p.cost,2)+' ₸/'+p.unit+'</span></div>';}).join('');

window.pickIncItem=function(idx,pid){
  var p=findP(pid);if(!p)return;
  _incForm.items[idx].name=p.name;_incForm.items[idx].unit=p.unit;_incForm.items[idx].price=p.cost;
  var ni=document.getElementById('incN'+idx);if(ni)ni.value=p.name;
  // update unit select in DOM
  var row=document.getElementById('incRow'+idx);
  if(row){var sel=row.querySelectorAll('select')[0];if(sel)sel.value=p.unit;}
  hideIncSugg(idx);

window.submitIncoming=function(){
  var valid=_incForm.items.filter(function(i){return i.name.trim()&&i.qty>0;});
  if(!valid.length){showToast('Заполните товары','err');return;}
  var zeroPrice=valid.filter(function(i){return !i.price||i.price<=0;});
  if(zeroPrice.length){showToast('Укажите цену для: '+zeroPrice.map(function(i){return i.name;}).join(', '),'err');return;}
  // Проверка дублей внутри формы прихода
  var seenNames={};
  var dupInForm=[];
  valid.forEach(function(i){var k=i.name.trim().toLowerCase();if(seenNames[k])dupInForm.push(i.name.trim());else seenNames[k]=true;});
  if(dupInForm.length){showToast('Дублирующийся товар: '+dupInForm[0],'err');return;}
  var supplier=_incForm.supplier||'';
  valid.forEach(function(item){
    var idx=DB.products.findIndex(function(p){return p.name.toLowerCase()===item.name.toLowerCase();});
    if(idx>=0){
      var p=DB.products[idx];
      if(p.qty<0)p.qty=0; // сбрасываем минус перед приходом
      var newCost=updateAvgCost(p,item.qty,item.price);
      p.qty+=item.qty;p.cost=newCost;
      p.supplier=supplier||p.supplier||'';
      item._pid=p.id;
    }else{
      var np={id:genId('P'),name:item.name,unit:item.unit,qty:item.qty,cost:item.price,minQty:0,supplier:supplier};
      DB.products.push(np);item._pid=np.id;
    }
  });
  DB.invoices.unshift({id:genId('INV'),date:_incForm.date,supplier:supplier,items:valid,addedBy:AUTH.profile?AUTH.profile.name||AUTH.profile.email:'',addedByRole:AUTH.role||'owner'});
  _incForm={date:toDay(),supplier:'',items:[]};
  // FIX-11/10: перестраиваем индексы т.к. могли создаться новые продукты
  rebuildIndexes();invalidateTTKCostCache();
  scheduleSave(['invoices','products']);showToast('Приход зачислен ✓');renderTab('income');
};

window.addSupplier=function(){
  var n=document.getElementById('newSupp').value.trim();
  if(!n){showToast('Введите название','err');return;}
  if(DB.suppliers.includes(n)){showToast('Уже есть','err');return;}

window.submitWriteoff=function(){if(!isOwner()){showToast('Нет доступа','err');return;}
  var type=document.getElementById('wtype').value;
  var date=document.getElementById('wdate').value;
  var note=document.getElementById('wnote').value.trim();
  var pid=document.getElementById('wpid').value;
  if(!date){showToast('Укажите дату','err');return;}
  if(!pid){showToast('Выберите товар из списка','err');return;}
  var p=findP(pid);if(!p)return;
  var qty=parseFloat((document.getElementById('wqty').value||'').replace(',','.'))||0;
  if(qty<=0){showToast('Укажите количество','err');return;}
  function doWriteoff(){
    p.qty=p.qty-qty;
    DB.writeoffs.unshift({id:genId('W'),date:date,type:type,pid:p.id,productName:p.name,unit:p.unit,qty:qty,cost:p.cost,note:note,addedBy:AUTH.profile?AUTH.profile.name||AUTH.profile.email:'',addedByRole:AUTH.role||'owner'});
    scheduleSave(['writeoffs','products']);showToast('Списание добавлено');
    _forceCloseModal();renderTab('write');
  }
  if(qty>p.qty){
    openConfirm(
      'Остатка не хватает',
      'Остаток '+fmt(p.qty,3)+' '+p.unit+', списываем '+fmt(qty,3)+' '+p.unit+'. Остаток уйдёт в минус.',
      doWriteoff,
      'Продолжить'  // FIX-13: не «Удалить», а «Продолжить»
    );
  }else{
    doWriteoff();
  }
};

var _salesDate=null;
// Draft quantities: {ttkId: qty} — persists between renders for current _salesDate
var _salesDraft={};

// Load quantities for a given date from DB.sales into draft
function loadSalesDraft(date){
  _salesDraft={};
  var rec=DB.sales.find(function(s){return s.date===date;});
  if(rec){rec.items.forEach(function(si){_salesDraft[si.ttkId]=si.qty;});}
}

function renderSalesDishes(){
  if(!_salesDate)_salesDate=toDay();

  // When date changes, reload draft from saved data (or empty)
  if(_salesDraft._loadedDate!==_salesDate){
    loadSalesDraft(_salesDate);
    _salesDraft._loadedDate=_salesDate;
  }

  var existingRec=DB.sales.find(function(s){return s.date===_salesDate;});
  var isEditing=!!existingRec; // date already has saved sales

  var cats=[...new Set(DB.ttk.map(function(t){return t.category;}))];
  var ttkRows=cats.map(function(cat){
    var items=DB.ttk.filter(function(t){return t.category===cat;});
    return '<div class="sec-ttl">'+cat+'</div>'+
      items.map(function(t){
        var m=calcMargin(t);
        var savedQty=_salesDraft[t.id]||0;
        return '<div class="cd" style="padding:10px 12px;margin-bottom:8px">'+
          '<div style="display:flex;justify-content:space-between;align-items:center">'+
            '<div><div style="font-size:12px;font-weight:700">'+t.name+'</div>'+
              '<div style="font-size:10px;color:#64748b">'+fmt(t.menuPrice)+' ₸ · <span style="color:#ef4444">с/с '+fmt(m.cost,0)+' ₸</span> · <span style="color:'+(m.pct>=60?'#4ade80':m.pct>=40?'#facc15':'#ef4444')+'">'+fmtP(m.pct)+'</span></div></div>'+
            '<div style="display:flex;align-items:center;gap:6px">'+
              '<button onclick="adjSaleQty(\''+t.id+'\',-1)" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#e2e8f0;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">−</button>'+
              '<input id="sqty_'+t.id+'" type="text" inputmode="decimal" value="'+savedQty+'" style="width:44px;text-align:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 4px;color:#e2e8f0;font-size:14px;font-weight:700" oninput="_salesDraft[\''+t.id+'\']=parseFloat(this.value)||0;updateSalesTotal()">'+
              '<button onclick="adjSaleQty(\''+t.id+'\',1)" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.15);color:#6366f1;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">+</button>'+
            '</div>'+
          '</div>'+
        '</div>';
      }).join('');
  }).join('');

  // Total from current draft
  var draftTotal=DB.ttk.reduce(function(s,t){return s+(_salesDraft[t.id]||0)*t.menuPrice;},0);

  var submitLabel=isEditing?'Обновить продажи':'Зафиксировать продажи';
  var statusBar=isEditing?
    '<div style="background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#6366f1;font-weight:600">Редактирование — продажи за эту дату уже сохранены</div>':'';

  return '<div class="cd" style="margin-bottom:10px">'+
      '<div class="cd-title" style="margin-bottom:8px">Дата продажи</div>'+
      '<input class="inp" type="date" value="'+_salesDate+'" onchange="_salesDate=this.value;_salesDraft={};renderTab(\'salesd\')">'+
    '</div>'+
    statusBar+
    (DB.ttk.length?
      ttkRows+
      '<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:12px 14px;margin-top:4px;margin-bottom:10px">'+
        '<span style="font-size:11px;color:#94a3b8;font-weight:600">Итого</span>'+
        '<span id="salesTotalVal" style="font-size:18px;font-weight:800;color:#6366f1">'+fmt(draftTotal)+' ₸</span>'+
      '</div>'+
      '<button class="btn btn-p" onclick="submitAllSales()" style="margin-bottom:16px">'+submitLabel+'</button>'
    :'<div class="empty"><div class="empty-text">Нет ТТК. Создайте блюда.</div></div>');
}

window.adjSaleQty=function(ttkId,delta){
  var el=document.getElementById('sqty_'+ttkId);if(!el)return;
  var v=Math.max(0,(parseFloat(el.value)||0)+delta);
  el.value=v;
  _salesDraft[ttkId]=v;
  updateSalesTotal();
};
window.updateSalesTotal=function(){
  var total=DB.ttk.reduce(function(s,t){
    var el=document.getElementById('sqty_'+t.id);
    return s+(el?parseFloat(el.value)||0:_salesDraft[t.id]||0)*t.menuPrice;
  },0);
  var el=document.getElementById('salesTotalVal');
  if(el)el.textContent=fmt(total)+' ₸';
};
window.submitAllSales=function(){
  var date=_salesDate||toDay();
  var saleItems=[];
  var warnings=[];
  DB.ttk.forEach(function(t){
    var el=document.getElementById('sqty_'+t.id);
    var portions=el?parseFloat(el.value)||0:_salesDraft[t.id]||0;
    if(portions<=0)return;
    t.ingredients.forEach(function(ing){
      var qty=ing.weight*(ing.coef!=null?ing.coef:1)*portions;
      var p=findP(ing.pid);if(p){if(p.unit==='кг'||p.unit==='л')qty=qty/1000;if(p.qty<qty)warnings.push(ing.name+' ('+t.name+')');}
    });
    saleItems.push({t:t,portions:portions});
  });
  if(!saleItems.length){showToast('Укажите количество блюд','err');return;}

  function doSave(){
    // If record for this date exists — reverse previous stock deductions first
    var existing=DB.sales.find(function(s){return s.date===date;});
  if(existing){
    // Restore stock from previous writeoffs for this date with type 'Продажа блюда'
    DB.writeoffs.filter(function(w){return w.date===date&&w.type==='Продажа блюда';}).forEach(function(w){
      var p=w.pid?findP(w.pid):DB.products.find(function(p){return p.name===w.productName;});
      if(p)p.qty+=w.qty;
    });
    // Remove old writeoffs for this date
    DB.writeoffs=DB.writeoffs.filter(function(w){return!(w.date===date&&w.type==='Продажа блюда');});
    // Remove old sale record
    DB.sales=DB.sales.filter(function(s){return s.date!==date;});
  }

  // Write new sale + writeoffs
  var allSaleItems=[];
  saleItems.forEach(function(si){
    var t=si.t;var portions=si.portions;
    t.ingredients.forEach(function(ing){
      var qty=ing.weight*(ing.coef!=null?ing.coef:1)*portions;
      var p=findP(ing.pid);
      // FIX-4: unit берём из объекта продукта если он есть; fallback — 'г' (ингредиент ТТК не хранит unit)
      var unit=p?p.unit:'г';
      if(p){if(p.unit==='кг'||p.unit==='л')qty=qty/1000;p.qty=p.qty-qty;}
      else{if(unit==='кг'||unit==='л')qty=qty/1000;}
      DB.writeoffs.unshift({id:genId('W'),date:date,type:'Продажа блюда',pid:ing.pid,productName:ing.name,unit:unit,qty:parseFloat(qty.toFixed(4)),cost:p?p.cost:0,dishName:t.name});
    });
    allSaleItems.push({ttkId:t.id,name:t.name,qty:portions,price:t.menuPrice});
  });
  DB.sales.unshift({id:genId('SL'),date:date,items:allSaleItems});

  // Update draft to reflect saved state
  allSaleItems.forEach(function(si){_salesDraft[si.ttkId]=si.qty;});
  _salesDraft._loadedDate=date;

  scheduleSave(['writeoffs','products','sales']);
  // FIX-10/11: сбрасываем кэш стоимости — цены могли измениться
  invalidateTTKCostCache();
  var successMsg=existing?'Продажи обновлены':'Продажи зафиксированы';
  _forceCloseModal(); // закрываем confirm-диалог если был открыт
  showToast(successMsg);
  renderTab('salesd');
  } // end doSave

  // BUG-8 FIX: нехватка товаров требует подтверждения, а не просто тоста
  if(warnings.length){
    // Дедупликация предупреждений
    var uniqWarnings=[...new Set(warnings)];
    openConfirm(
      'Не хватает ингредиентов',
      uniqWarnings.slice(0,5).join(', ')+(uniqWarnings.length>5?' и ещё '+(uniqWarnings.length-5)+'..':'')+'. Остатки уйдут в минус.',
      doSave,
      'Всё равно зафиксировать'
    );
  }else{
    doSave();
  }
};

function renderInventory(){
  var html='<button class="btn btn-p" onclick="startInventory()" style="margin-bottom:12px">+ Новая ревизия</button>';
  if(DB.inventory.length===0)html+='<div class="empty"><div class="empty-text">Нет ревизий</div></div>';
  else html+=DB.inventory.map(function(inv,invIdx){
    var changedItems=inv.items.filter(function(i){return i.diff!==0;});
    var unchangedCount=inv.items.length-changedItems.length;
    var surplus=changedItems.filter(function(i){return i.diff>0;}).length;
    var shortage=changedItems.filter(function(i){return i.diff<0;}).length;
    var totalDiff=inv.items.reduce(function(s,i){return s+i.diff*(i.cost||0);},0);
    return '<div class="cd">'+
      '<div class="cd-title">Ревизия '+inv.date+
        '<span style="font-size:10px;font-weight:400;color:#64748b;margin-left:8px">'+inv.items.length+' позиций</span>'+
        '<button class="btn btn-g btn-sm" onclick="editInventory('+invIdx+')" style="font-size:10px;padding:4px 10px;width:auto;margin-left:auto">✏ Изменить</button>'+
      '</div>'+
      '<div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap">'+
        '<span style="font-size:11px;color:#4ade80">Излишек: '+surplus+'</span>'+
        '<span style="font-size:11px;color:#ef4444">Недостача: '+shortage+'</span>'+
        (totalDiff!==0?'<span style="font-size:11px;color:'+(totalDiff>=0?'#4ade80':'#ef4444')+';font-weight:700">'+(totalDiff>0?'+':'')+fmt(totalDiff,0)+' ₸</span>':'')+
      '</div>'+
      '<div class="inv-row" style="font-size:9px;color:#475569;text-transform:uppercase;font-weight:700">'+
        '<span>Товар</span><span>По системе</span><span>Факт.</span><span>Разница</span>'+
      '</div>'+
      changedItems.map(function(it){
        var cl=it.diff>0?'#4ade80':it.diff<0?'#ef4444':'#64748b';
        var badge=it.diff>0?'<span style="font-size:9px;color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:4px;padding:1px 5px;margin-left:4px">+приход</span>':
                            '<span style="font-size:9px;color:#ef4444;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:4px;padding:1px 5px;margin-left:4px">−списание</span>';
        return '<div class="inv-row">'+
          '<div style="font-weight:600">'+it.name+badge+'</div>'+
          '<div>'+fmt(it.system,3)+' '+it.unit+'</div>'+
          '<div>'+fmt(it.actual,3)+' '+it.unit+'</div>'+
          '<div style="color:'+cl+';font-weight:700">'+(it.diff>0?'+':'')+fmt(it.diff,3)+'</div>'+
        '</div>';
      }).join('')+
      (unchangedCount>0?'<div style="font-size:10px;color:#475569;padding:6px 0">'+unchangedCount+' позиций без изменений</div>':'')+
    '</div>';
  }).join('');
  return html;
}

// FEATURE 5: редактирование ревизии
window.editInventory=function(invIdx){
  var inv=DB.inventory[invIdx];if(!inv)return;
  // Откатываем прежние изменения склада
  inv.items.forEach(function(it){
    var p=findP(it.pid);if(!p)return;
    // откат: ставим склад обратно на system (значение ДО ревизии)
    p.qty=it.system;
  });
  // Удаляем writeoffs созданные этой ревизией (по дате + type=Инвентаризация + note=Недостача)
  // Храним invId для точного матчинга
  if(inv.id){
    DB.writeoffs=DB.writeoffs.filter(function(w){return w.invId!==inv.id;});
    // Also remove surplus invoices created by this inventory revision
    DB.invoices=DB.invoices.filter(function(x){return x.invId!==inv.id;});
  }
  // Формируем _invForm из этой ревизии (actual уже известен)
  _invGroupFilter='';_invCollapsed={};
  _invForm={
    date:inv.date,
    _editIdx:invIdx,
    _editId:inv.id,
    items:inv.items.map(function(it){
      return{pid:it.pid,name:it.name,unit:it.unit,cost:it.cost,system:it.system,actual:it.actual,_touched:true,supplier:(findP(it.pid)||{}).supplier||''};
    })
  };
  // Добавляем товары которых не было при исходной ревизии
  DB.products.forEach(function(p){
    if(!_invForm.items.some(function(it){return it.pid===p.id;})){
      _invForm.items.push({pid:p.id,name:p.name,unit:p.unit,cost:p.cost,system:p.qty,actual:p.qty,_touched:false,supplier:p.supplier||''});
    }
  });
  rebuildIndexes();invalidateTTKCostCache();
  scheduleSave(['products','writeoffs']);
  // Открываем модалку (переиспользуем buildInvModal логику)
  window.startInventory._openModal(_invForm);
};

window.submitInventory=function(){if(!isOwner()){showToast('Нет доступа','err');return;}
  _invForm.date=document.getElementById('invdate').value;
  var isEdit=_invForm._editIdx!=null;
  var items=_invForm.items.map(function(it){
    var actualVal=it._touched?it.actual:it.system;
    var diff=parseFloat((actualVal-it.system).toFixed(4));
    return{pid:it.pid,name:it.name,unit:it.unit,cost:it.cost||0,system:it.system,actual:actualVal,diff:diff};
  });

  var invId=isEdit?_invForm._editId:genId('INVI');

  // FEATURE 6: излишек создаёт приход в DB.invoices + FEATURE 5: списания помечаем invId
  items.forEach(function(it){
    var p=findP(it.pid);if(!p)return;
    // Всегда синхронизируем остаток с фактом (включая diff=0 — убирает рассинхрон при редактировании)
    p.qty=it.actual;
    if(it.diff!==0){
      if(it.diff<0){
        // Недостача → списание (помечаем invId для точного отката при редактировании)
        DB.writeoffs.unshift({id:genId('W'),invId:invId,date:_invForm.date,type:'Инвентаризация',productName:it.name,unit:it.unit,qty:Math.abs(it.diff),cost:it.cost||0,note:'Недостача'});
      }else{
        // FEATURE 6: Излишек → автоматический приход в историю поставок
        var existingInvInvoice=DB.invoices.find(function(inv){return inv.invId===invId;});
        if(!existingInvInvoice){
          existingInvInvoice={id:genId('INV_INC'),invId:invId,date:_invForm.date,supplier:'Инвентаризация',items:[]};
          DB.invoices.unshift(existingInvInvoice);
        }
        existingInvInvoice.items.push({name:it.name,qty:it.diff,unit:it.unit,price:it.cost||0});
      }
    }
  });

  rebuildIndexes();invalidateTTKCostCache();

  if(isEdit){
    // Заменяем запись ревизии
    DB.inventory[_invForm._editIdx]={id:invId,date:_invForm.date,items:items};
  }else{
    DB.inventory.unshift({id:invId,date:_invForm.date,items:items});
  }

  scheduleSave(['inventory','products','writeoffs','invoices']);
  _forceCloseModal();showToast(isEdit?'Ревизия обновлена ✓':'Ревизия сохранена ✓');renderTab('invent');
};

// Загружаем ВСЕ ключи workspace одним запросом
async function loadAllData(){
  var uid=getUserId();
  var url=SUPABASE_URL+'/rest/v1/'+SUPABASE_TABLE+
    '?user_id=eq.'+encodeURIComponent(uid)+
    '&select=key,value';
  var timeout=new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},8000);});
  var res=await Promise.race([fetch(url,{headers:getAuthHeaders()}),timeout]);
  if(!res.ok)throw new Error('loadAll error: '+res.status);
  var rows=await res.json();
  var map={};
  if(rows&&rows.length){rows.forEach(function(r){map[r.key]=r.value;});}
  return map;
}

function showAuthError(msg){
  var el = document.getElementById('authErr');
  if(el){el.textContent = msg; el.style.display = 'block';}
}
function clearAuthError(){
  var el = document.getElementById('authErr');
  if(el) el.style.display = 'none';
}
function setAuthLoading(loading){
  var btns = document.querySelectorAll('#authScreen .btn');
  btns.forEach(function(b){ b.disabled = loading; b.style.opacity = loading ? '0.6' : '1'; });
}

// ── LOGIN ────────────────────────────────────────────────
window.doLogin = async function(){
  clearAuthError();
  var email = (document.getElementById('authEmail').value||'').trim().toLowerCase();
  var pass = document.getElementById('authPass').value;
  if(!email || !pass){ showAuthError('Введите email и пароль'); return; }
  setAuthLoading(true);
  try{
    var data = await sbAuth('token?grant_type=password', {email:email, password:pass});
    await onAuthSuccess(data);
  }catch(e){
    setAuthLoading(false);
    showAuthError(e.message === 'Invalid login credentials' ? 'Неверный email или пароль' : e.message);
  }
};

// ── REGISTER OWNER ───────────────────────────────────────
window.doRegisterOwner = async function(){
  clearAuthError();
  var licCode = (document.getElementById('authLicCode')&&document.getElementById('authLicCode').value||'').trim().toUpperCase();
  var name = (document.getElementById('authName').value||'').trim();
  var email = (document.getElementById('authEmail').value||'').trim().toLowerCase();
  var pass = document.getElementById('authPass').value;
  if(!licCode){ showAuthError('Введите лицензионный код'); return; }
  if(!name){ showAuthError('Введите ваше имя'); return; }
  if(!email || !pass){ showAuthError('Введите email и пароль'); return; }
  if(pass.length < 6){ showAuthError('Пароль минимум 6 символов'); return; }
  setAuthLoading(true);
  try{
    // 1. Проверяем лицензионный код
    var licRes = await fetch(SUPABASE_URL+'/rest/v1/esep_licenses?code=eq.'+encodeURIComponent(licCode)+'&select=id,code,is_used&limit=1',
      {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    var licRows = await licRes.json();
    if(!licRows||!licRows.length) throw new Error('Лицензионный код не найден. Обратитесь к разработчику.');
    if(licRows[0].is_used) throw new Error('Этот код уже использован. Обратитесь к разработчику.');
    var licId = licRows[0].id;
    // 2. Регистрируем
    var signupData = await sbAuth('signup', {email:email, password:pass, data:{name:name}});
    if(!signupData.access_token) throw new Error('Ошибка регистрации. Попробуйте ещё раз.');
    AUTH.session = signupData;
    // 3. Генерируем workspace_id и invite_code
    var workspaceId = 'ws_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    var inviteCode = Math.random().toString(36).slice(2,6).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
    // 4. Помечаем лицензию как использованную
    await fetch(SUPABASE_URL+'/rest/v1/esep_licenses?id=eq.'+encodeURIComponent(licId),{
      method:'PATCH',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+signupData.access_token,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({is_used:true,used_at:new Date().toISOString(),used_by:email,used_by_name:name})
    });
    // 5. Сохраняем профиль
    await sbREST('POST','esep_profiles','',{
      id: signupData.user.id,
      email: email,
      name: name,
      role: 'owner',
      workspace_id: workspaceId,
      invite_code: inviteCode,
      created_at: new Date().toISOString()
    });
    AUTH.profile = {id:signupData.user.id, email:email, name:name, role:'owner', workspace_id:workspaceId, invite_code:inviteCode};
    AUTH.role = 'owner';
    AUTH.workspaceId = workspaceId;
    try{ localStorage.setItem('_esep_session', JSON.stringify(signupData)); }catch(e){}
    await loadAppData();
    showToast('Добро пожаловать, ' + name + '!');
    setTimeout(function(){ openInviteCodeModal(inviteCode); }, 1200);
  }catch(e){
    setAuthLoading(false);
    showAuthError(e.message);
  }
};

// ── ON AUTH SUCCESS ──────────────────────────────────────
async function onAuthSuccess(sessionData){
  AUTH.session = sessionData;
  // Always persist latest session (tokens may have been refreshed)
  try{ localStorage.setItem('_esep_session', JSON.stringify(sessionData)); }catch(e){}
  // Загружаем профиль пользователя
  var uid = sessionData.user.id;
  var url = SUPABASE_URL + '/rest/v1/esep_profiles?id=eq.' + uid + '&limit=1';
  var res = await fetch(url, {headers: getAuthHeaders()});
  var rows = await res.json();
  if(!rows || !rows.length) throw new Error('Профиль не найден. Обратитесь к администратору.');
  var profile = rows[0];
  AUTH.profile = profile;
  AUTH.role = profile.role;
  AUTH.workspaceId = profile.workspace_id;
  await loadAppData();
}

// ── LOAD APP DATA ────────────────────────────────────────
async function loadAppData(){
  document.getElementById('authScreen').style.display='none';
  var lds=document.getElementById('loadingScreen');
  lds.style.display='flex';
  // Update loading subtitle
  var lsub=lds.querySelector('.ld-sub');
  if(lsub)lsub.textContent='Загрузка данных...';
  try{
    var map = await loadAllData();
    DB.products = map['es_products'] || [];
    DB.ttk = map['es_ttk'] || [];
    DB.invoices = map['es_invoices'] || [];
    DB.writeoffs = map['es_writeoffs'] || [];
    DB.inventory = map['es_inventory'] || [];
    DB.sales = map['es_sales'] || [];
    DB.suppliers = map['es_suppliers'] || [];
    TRASH = map['es_trash'] || [];
    rebuildIndexes();
    var savedSettings = map['es_settings'];
    if(savedSettings){
      // Восстанавливаем HOME_CARDS если были сохранены
      if(savedSettings._homeCards) Object.assign(HOME_CARDS, savedSettings._homeCards);
      delete savedSettings._homeCards;
      APP_SETTINGS = Object.assign(APP_SETTINGS, savedSettings);
    }
    if(!map['es_ttk']) saveData('es_ttk', DB.ttk).catch(function(){});
    if(!map['es_sales']||!map['es_sales'].length) saveData('es_sales', DB.sales).catch(function(){});
  }catch(e){
    DB.products = [];
    rebuildIndexes();
  }
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  buildNav();
  var firstTab = isOwner() ? 'home' : 'income';
  renderTab(firstTab);
}

window.removeTeamMember = function(uid, name){

// ════════════════════════════════════════════════════════
// ЛИЦЕНЗИИ — управление кодами доступа
// ════════════════════════════════════════════════════════
function genLicCode(){
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var part=function(){var s='';for(var i=0;i<4;i++)s+=chars[Math.floor(Math.random()*chars.length)];return s;};
  return part()+'-'+part();
}

window.generateLicense = async function(){
  if(!isSuperAdmin()){showToast('Нет доступа','err');return;}
  var note = prompt('Заметка для кода (имя клиента, тариф):','') || '';
  var code = genLicCode();
  var id = 'lic_'+Date.now().toString(36);
  try{
    var res = await fetch(SUPABASE_URL+'/rest/v1/esep_licenses',{
      method:'POST',
      headers:{...getAuthHeaders(),'Prefer':'return=minimal'},
      body:JSON.stringify({id:id,code:code,note:note,is_used:false,created_at:new Date().toISOString()})
    });
    if(!res.ok)throw new Error('Ошибка создания: '+res.status);
    showToast('Код создан: '+code);
    loadLicenses();
    // Показываем код для копирования
    openModal(
      '<button class="modal-close" onclick="closeModal()">✕</button>'+
      '<div class="modal-title" style="color:#facc15">Новый лицензионный код</div>'+
      '<div style="background:#1e293b;border:1px solid rgba(250,204,21,.3);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px">'+
        '<div style="font-size:10px;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em">Код доступа</div>'+
        '<div id="newLicCode" style="font-size:28px;font-weight:900;color:#facc15;letter-spacing:.2em;font-family:monospace">'+code+'</div>'+
        (note?'<div style="font-size:10px;color:#64748b;margin-top:6px">'+esc(note)+'</div>':'')+
      '</div>'+
      '<button class="btn btn-p" id="copyLicBtn" style="margin-bottom:8px">Скопировать код</button>'+
      '<button class="btn btn-g btn-sm" onclick="closeModal()" style="width:100%">Закрыть</button>'
    );
    setTimeout(function(){
      var btn=document.getElementById('copyLicBtn');
      if(btn)btn.onclick=function(){
        if(navigator.clipboard)navigator.clipboard.writeText(code).then(function(){showToast('Скопировано ✓');});
        else{var ta=document.createElement('textarea');ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Скопировано ✓');}
      };
    },50);
  }catch(e){showToast(e.message,'err');}
};

window.loadLicenses = async function(){
  if(!isSuperAdmin())return;
  var el=document.getElementById('licenseList');
  if(!el)return;
  el.innerHTML='<div style="font-size:11px;color:#475569;text-align:center;padding:8px">Загрузка...</div>';
  try{
    var res=await fetch(SUPABASE_URL+'/rest/v1/esep_licenses?order=created_at.desc&limit=50',
      {headers:getAuthHeaders()});
    var rows=await res.json();
    if(!rows||!rows.length){
      el.innerHTML='<div style="font-size:11px;color:#475569;text-align:center;padding:8px">Нет лицензий</div>';
      return;
    }
    el.innerHTML=rows.map(function(lic){
      var usedColor=lic.is_used?'#ef4444':'#4ade80';
      var usedLabel=lic.is_used?'Использован':'Активен';
      return '<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:6px">'+
            '<span style="font-size:13px;font-weight:800;font-family:monospace;color:#facc15;letter-spacing:.1em">'+lic.code+'</span>'+
            '<span style="font-size:9px;padding:1px 6px;border-radius:5px;background:rgba('+(lic.is_used?'239,68,68':'74,222,128')+',.1);color:'+usedColor+';font-weight:700">'+usedLabel+'</span>'+
          '</div>'+
          '<div style="font-size:10px;color:#64748b;margin-top:2px">'+
            (lic.note?'<span style="color:#94a3b8">'+esc(lic.note)+'</span> · ':'') +
            lic.created_at.slice(0,10)+
            (lic.is_used&&lic.used_by_name?' → <span style="color:#ef4444">'+esc(lic.used_by_name)+'</span>':'')+
          '</div>'+
        '</div>'+
        (!lic.is_used?
          '<button data-code="'+esc(lic.code)+'" onclick="copyLicCode(this.dataset.code)" style="flex-shrink:0;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.2);color:#facc15;border-radius:8px;padding:4px 8px;font-size:10px;cursor:pointer">Копировать</button>':'')+
        (!lic.is_used?
          '<button data-lid="'+esc(lic.id)+'" onclick="deleteLicense(this.dataset.lid)" style="flex-shrink:0;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:8px;padding:4px 8px;font-size:10px;cursor:pointer">×</button>':'')+
      '</div>';
    }).join('');
  }catch(e){
    el.innerHTML='<div style="font-size:11px;color:#ef4444;text-align:center;padding:8px">Ошибка загрузки</div>';
  }
};

window.copyLicCode = function(code){
  if(navigator.clipboard)navigator.clipboard.writeText(code).then(function(){showToast('Код скопирован: '+code);});
  else{var ta=document.createElement('textarea');ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Скопировано ✓');}
};

window.deleteLicense = async function(id){
  if(!isSuperAdmin()){showToast('Нет доступа','err');return;}
  openConfirm('Удалить лицензию?','Код будет деактивирован навсегда.',async function(){
    try{
      await fetch(SUPABASE_URL+'/rest/v1/esep_licenses?id=eq.'+encodeURIComponent(id),
        {method:'DELETE',headers:getAuthHeaders()});
      showToast('Лицензия удалена');
      loadLicenses();
    }catch(e){showToast('Ошибка удаления','err');}
  },'Удалить');
};

window.doLogout = async function(){
  openConfirm('Выйти из аккаунта?', AUTH.profile ? AUTH.profile.email : '', async function(){
    try{
      if(AUTH.session){
        await fetch(SUPABASE_URL+'/auth/v1/logout', {
          method:'POST',
          headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+AUTH.session.access_token}
        });
      }
    }catch(e){}
    AUTH = {session:null, profile:null, role:null, workspaceId:null};
    localStorage.removeItem('_esep_session');
    document.getElementById('app').style.display='none';
    showAuthScreen('login');
  },'Выйти');
};

// ── INVITE CODE MODAL ─────────────────────────────────────
function openInviteCodeModal(code){
  var safeCode = String(code||'');
  var h = [];
  h.push('<div class="modal-title" style="color:#4ade80">Аккаунт создан!</div>');
  h.push('<div style="font-size:13px;color:#94a3b8;margin-bottom:16px">Поделитесь этим кодом с менеджерами. Они используют его при регистрации.</div>');
  h.push('<div style="background:#1e293b;border:1px solid rgba(99,102,241,.3);border-radius:12px;padding:16px;text-align:center;margin-bottom:16px">');
  h.push('<div style="font-size:11px;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em">Код приглашения</div>');
  h.push('<div id="invCodeText" style="font-size:26px;font-weight:900;color:#6366f1;letter-spacing:.15em;font-family:monospace">'+safeCode+'</div>');
  h.push('</div>');
  h.push('<button class="btn btn-p" id="copyInvCodeBtn" style="margin-bottom:8px">Скопировать код</button>');
  h.push('<button class="btn btn-g btn-sm" onclick="closeModal()" style="width:100%">Закрыть</button>');
  openModal(h.join(''));
  // Attach copy handler after modal is in DOM
  setTimeout(function(){
    var btn = document.getElementById('copyInvCodeBtn');
    if(btn) btn.onclick = function(){
      if(navigator.clipboard){
        navigator.clipboard.writeText(safeCode).then(function(){ showToast('Скопировано \u2713'); }).catch(function(){ fallbackCopy(safeCode); });
      } else { fallbackCopy(safeCode); }
    };
  }, 50);
}
function fallbackCopy(text){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('Скопировано \u2713'); } catch(e) { showToast('Скопируйте вручную: '+text); }
  document.body.removeChild(ta);
}

// ── SHOW INVITE CODE (from settings) ─────────────────────
window.showMyInviteCode = function(){
  if(!AUTH.profile || !AUTH.profile.invite_code){ showToast('Код недоступен','err'); return; }
  openInviteCodeModal(AUTH.profile.invite_code);
};

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
async function init(){
  // Инициализируем Telegram WebApp
  try{
    var tg=window.Telegram&&window.Telegram.WebApp;
    if(tg){
      try{tg.ready();}catch(e){}
      try{tg.expand();}catch(e){}
      try{tg.setHeaderColor('#0b1120');}catch(e){}
      try{tg.setBackgroundColor('#0b1120');}catch(e){}
    }
  }catch(e){}

  // Пробуем восстановить сессию из localStorage
  var savedSession = null;
  try{ savedSession = JSON.parse(localStorage.getItem('_esep_session') || 'null'); }catch(e){}

  if(savedSession && savedSession.access_token){
    try{
      // Проверяем токен
      var userRes = await fetch(SUPABASE_URL+'/auth/v1/user', {
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+savedSession.access_token}
      });
      if(userRes.ok){
        savedSession.user = await userRes.json();
        await onAuthSuccess(savedSession);
        return;
      }
      // Токен истёк — пробуем refresh
      if(savedSession.refresh_token){
        var refreshData = await sbAuth('token?grant_type=refresh_token', {refresh_token: savedSession.refresh_token});
        await onAuthSuccess(refreshData);
        return;
      }
    }catch(e){ }
  }

  // Нет сессии — показываем экран входа
  document.getElementById('loadingScreen').style.display='none';
  showAuthScreen('login');
}

// Swipe navigation — DISABLED (sidebar nav only)

init();

// ── GLOBAL: Enter key closes keyboard (registered once) ──────────────────
if(!window._enterListenerAdded){
  window._enterListenerAdded = true;
  document.addEventListener('keydown', function(e){
    if(e.key !== 'Enter') return;
    var t = e.target;
    var tag = t.tagName;
    var type = (t.type || '').toLowerCase();
    if(tag === 'TEXTAREA' || tag === 'BUTTON' || tag === 'SELECT') return;
    if(type === 'date' || type === 'time' || type === 'datetime-local') return;
    if(t.hasAttribute('data-enter-submit')) return;
    e.preventDefault();
    t.blur();
  }, true);
}
