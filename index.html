    (filteredInv.length?'<div class="cd"><div class="cd-title">–Ш—Б—В–Њ—А–Є—П –њ–Њ—Б—В–∞–≤–Њ–Ї вАФ '+MONTH_FULL[parseInt(selM)-1]+' '+selY+'</div>'+hist+'</div>':'<div class="empty"><div class="empty-text">–Э–µ—В –њ–Њ—Б—В–∞–≤–Њ–Ї –Ј–∞ '+MONTH_FULL[parseInt(selM)-1]+' '+selY+'</div></div>');
}
window.addIncItem=function(){

      '<div style="position:relative;margin-bottom:8px">'+
        '<input class="inp" id="incN'+i+'" placeholder="–Ґ–Њ–≤–∞—А" value="" autocomplete="off" oninput="onIncInput('+i+',this.value)" onfocus="showIncSugg('+i+')" onblur="setTimeout(function(){hideIncSugg('+i+')},200)">'+

        '<div><label class="lbl">–Ъ–Њ–ї-–≤–Њ</label><input class="inp" type="number" placeholder="0" value="" oninput="_incForm.items['+i+'].qty=parseFloat(this.value)||0;updateIncTotal()"></div>'+
        '<div><label class="lbl">–Х–і.</label><select class="inp" onchange="_incForm.items['+i+'].unit=this.value"><option>–Ї–≥</option><option>–≥</option><option>–ї</option><option>–Љ–ї</option><option>—И—В</option><option>—Г–њ</option></select></div>'+
        '<div><label class="lbl">–¶–µ–љ–∞ вВЄ/–µ–і</label><input class="inp" type="number" placeholder="0" value="" oninput="_incForm.items['+i+'].price=parseFloat(this.value)||0;updateIncTotal()"></div>'+
        '<button onclick="remIncItem('+i+')" style="background:none;border:none;color:#475569;cursor:pointer;font-size:20px;padding:0;margin-bottom:2px">√Ч</button>'+
      '</div>'+
    '</div>';
  }({},idx);
  list.appendChild(div.firstChild);
  // show total row & submit if first item
  if(_incForm.items.length===1){

    if(cd&&!document.getElementById('incTotalRow')){
      var tot=document.createElement('div');
      tot.id='incTotalRow';tot.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(255,255,255,.07);margin-bottom:10px';

      var submitBtn=document.createElement('button');
      submitBtn.className='btn btn-p';submitBtn.textContent='–Ч–∞—З–Є—Б–ї–Є—В—М –љ–∞ —Б–Ї–ї–∞–і';submitBtn.onclick=window.submitIncoming;
      cd.appendChild(tot);cd.appendChild(submitBtn);
    }
  }
  // focus the new name input
  setTimeout(function(){var el=document.getElementById('incN'+idx);if(el)el.focus();},50);
};
window.updateIncTotal=function(){
  var total=_incForm.items.reduce(function(s,i){return s+i.qty*i.price;},0);
  var el=document.getElementById('incTotalVal');if(el)el.textContent=fmt(total)+' вВЄ';
};
window.remIncItem=function(idx){_incForm.items.splice(idx,1);renderTab('income');};
window.onIncInput=function(idx,val){
  _incForm.items[idx].name=val;showIncSugg(idx);
  var p=DB.products.find(function(p){return p.name.toLowerCase()===val.toLowerCase();});
  if(p){_incForm.items[idx].unit=p.unit;_incForm.items[idx].price=p.cost;}
};
window.showIncSugg=function(idx){
  var box=document.getElementById('incSugg'+idx);if(!box)return;
  var q=(_incForm.items[idx]&&_incForm.items[idx].name||'').toLowerCase().trim();
  var all=q?DB.products.filter(function(p){return p.name.toLowerCase().includes(q);}):DB.products;
  if(!all.length){box.style.display='none';return;}
  box.innerHTML=all.map(function(p){return'<div class="sugg-item" onmousedown="pickIncItem('+idx+',\''+p.id+'\')"><span style="font-size:12px;font-weight:600">'+p.name+'</span><span style="font-size:11px;color:#6366f1">'+fmt(p.cost,2)+' вВЄ/'+p.unit+'</span></div>';}).join('');

window.submitIncoming=function(){

  var zeroPrice=valid.filter(function(i){return !i.price||i.price<=0;});
  if(zeroPrice.length){showToast('–£–Ї–∞–ґ–Є—В–µ —Ж–µ–љ—Г –і–ї—П: '+zeroPrice.map(function(i){return i.name;}).join(', '),'err');return;}

  var seenNames={};

  valid.forEach(function(i){var k=i.name.trim().toLowerCase();if(seenNames[k])dupInForm.push(i.name.trim());else seenNames[k]=true;});

  var supplier=_incForm.supplier||'';
  valid.forEach(function(item){
    var idx=DB.products.findIndex(function(p){return p.name.toLowerCase()===item.name.toLowerCase();});
    if(idx>=0){
      var p=DB.products[idx];
      if(p.qty<0)p.qty=0; // —Б–±—А–∞—Б—Л–≤–∞–µ–Љ –Љ–Є–љ—Г—Б –њ–µ—А–µ–і –њ—А–Є—Е–Њ–і–Њ–Љ
      var newCost=updateAvgCost(p,item.qty,item.price);

};

window.applyWriteTemplate=function(ti){
  if(!isOwner()){showToast('–Э–µ—В –і–Њ—Б—В—Г–њ–∞','err');return;}
  var tpl=(APP_SETTINGS.writeTemplates||[])[ti];
  if(!tpl)return;
  var date=toDay();
  var applied=0,skipped=[];
  tpl.items.forEach(function(it){
    var p=findP(it.pid);
    if(!p){skipped.push(it.name);return;}
    p.qty=p.qty-it.qty;
    DB.writeoffs.unshift({id:genId('W'),date:date,type:'–†—Г—З–љ–Њ–µ —Б–њ–Є—Б–∞–љ–Є–µ',pid:p.id,productName:p.name,unit:p.unit,qty:it.qty,cost:p.cost,note:'–®–∞–±–ї–Њ–љ: '+tpl.name});
    applied++;

  if(skipped.length)showToast('–Э–µ –љ–∞–є–і–µ–љ–Њ: '+skipped.join(', '),'err');

};

// Load quantities for a given date from DB.sales into draft
function loadSalesDraft(date){
  _salesDraft={};

              '<input id="sqty_'+t.id+'" type="text" inputmode="decimal" value="'+savedQty+'" style="width:44px;text-align:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 4px;color:#e2e8f0;font-size:14px;font-weight:700" oninput="_salesDraft[\''+t.id+'\']=parseFloat(this.value)||0;updateSalesTotal()">'+
              '<button onclick="adjSaleQty(\''+t.id+'\',1)" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.15);color:#6366f1;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">+</button>'+
            '</div>'+
          '</div>'+
        '</div>';
      }).join('');
  }).join('');

  // Total from current draft
  var draftTotal=DB.ttk.reduce(function(s,t){return s+(_salesDraft[t.id]||0)*t.menuPrice;},0);

  var submitLabel=isEditing?'–Ю–±–љ–Њ–≤–Є—В—М –њ—А–Њ–і–∞–ґ–Є':'–Ч–∞—Д–Є–Ї—Б–Є—А–Њ–≤–∞—В—М –њ—А–Њ–і–∞–ґ–Є';
  var statusBar=isEditing?
    '<div style="background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#6366f1;font-weight:600">–†–µ–і–∞–Ї—В–Є—А–Њ–≤–∞–љ–Є–µ вАФ –њ—А–Њ–і–∞–ґ–Є –Ј–∞ —Н—В—Г –і–∞—В—Г —Г–ґ–µ —Б–Њ—Е—А–∞–љ–µ–љ—Л</div>':'';

  return '<div class="cd" style="margin-bottom:10px">'+
      '<div class="cd-title" style="margin-bottom:8px">–Ф–∞—В–∞ –њ—А–Њ–і–∞–ґ–Є</div>'+
      '<input class="inp" type="date" value="'+_salesDate+'" onchange="_salesDate=this.value;_salesDraft={};renderTab(\'salesd\')">'+
    '</div>'+
    statusBar+
    (DB.ttk.length?
      ttkRows+
      '<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:12px 14px;margin-top:4px;margin-bottom:10px">'+
        '<span style="font-size:11px;color:#94a3b8;font-weight:600">–Ш—В–Њ–≥–Њ</span>'+
        '<span id="salesTotalVal" style="font-size:18px;font-weight:800;color:#6366f1">'+fmt(draftTotal)+' вВЄ</span>'+
      '</div>'+

    :'<div class="empty"><div class="empty-text">–Э–µ—В –Ґ–Ґ–Ъ. –°–Њ–Ј–і–∞–є—В–µ –±–ї—О–і–∞.</div></div>');
}

window.adjSaleQty=function(ttkId,delta){
  var el=document.getElementById('sqty_'+ttkId);if(!el)return;
  var v=Math.max(0,(parseFloat(el.value)||0)+delta);
  el.value=v;
  _salesDraft[ttkId]=v;
  updateSalesTotal();
};
window.updateSalesTotal=function(){
  var total=DB.ttk.reduce(function(s,t){
    var el=document.getElementById('sqty_'+t.id);
    return s+(el?parseFloat(el.value)||0:_salesDraft[t.id]||0)*t.menuPrice;
  },0);
  var el=document.getElementById('salesTotalVal');
  if(el)el.textContent=fmt(total)+' вВЄ';
};
window.submitAllSales=function(){
  var date=_salesDate||toDay();
  var saleItems=[];
  var warnings=[];
  DB.ttk.forEach(function(t){
    var el=document.getElementById('sqty_'+t.id);
    var portions=el?parseFloat(el.value)||0:_salesDraft[t.id]||0;
    if(portions<=0)return;
    // –†–µ–Ї—Г—А—Б–Є–≤–љ–∞—П –њ—А–Њ–≤–µ—А–Ї–∞ –љ–µ—Е–≤–∞—В–Ї–Є —Б —Г—З—С—В–Њ–Љ –Я–§
    function checkIngShortage(ingredients, mult){
      ingredients.forEach(function(ing){
        if(ing.type==='sf'){
          var sf=findSF(ing.sfId);
          if(!sf)return;
          var coef=(ing.coef!=null&&ing.coef!=='')?Number(ing.coef):1;
          if(coef<=0)coef=1;
          var sfQtyG=ing.weight*coef*mult;
          var sfYieldG=sf.yield||1000;
          checkIngShortage(sf.ingredients||[], sfQtyG/sfYieldG);
        } else {
          var qty=ing.weight*(ing.coef!=null?ing.coef:1)*mult;
          var p=findP(ing.pid);
          if(p){if(p.unit==='–Ї–≥'||p.unit==='–ї')qty=qty/1000;if(p.qty<qty)warnings.push(ing.name+' ('+t.name+')');}
        }
      });
    }
    checkIngShortage(t.ingredients||[], portions);
    saleItems.push({t:t,portions:portions});
  });
  if(!saleItems.length){showToast('–£–Ї–∞–ґ–Є—В–µ –Ї–Њ–ї–Є—З–µ—Б—В–≤–Њ –±–ї—О–і','err');return;}

  // –Ю–њ—А–µ–і–µ–ї—П–µ–Љ –Ј–∞—А–∞–љ–µ–µ вАФ –µ—Б—В—М –ї–Є –Ј–∞–њ–Є—Б—М –Ј–∞ —Н—В—Г –і–∞—В—Г
  var existing=DB.sales.find(function(s){return s.date===date;});
  var successMsg=existing?'–Я—А–Њ–і–∞–ґ–Є –Њ–±–љ–Њ–≤–ї–µ–љ—Л':'–Я—А–Њ–і–∞–ґ–Є –Ј–∞—Д–Є–Ї—Б–Є—А–Њ–≤–∞–љ—Л';

  function doSave(){
    // If record for this date exists вАФ reverse previous stock deductions first
    if(existing){
      // Restore stock from previous writeoffs for this date with type '–Я—А–Њ–і–∞–ґ–∞ –±–ї—О–і–∞'
      DB.writeoffs.filter(function(w){return w.date===date&&w.type==='–Я—А–Њ–і–∞–ґ–∞ –±–ї—О–і–∞';}).forEach(function(w){
        var p=w.pid?findP(w.pid):DB.products.find(function(p){return p.name===w.productName;});
        if(p)p.qty+=w.qty;
      });
      // Remove old writeoffs for this date
      DB.writeoffs=DB.writeoffs.filter(function(w){return!(w.date===date&&w.type==='–Я—А–Њ–і–∞–ґ–∞ –±–ї—О–і–∞');});
      // Remove old sale record
      DB.sales=DB.sales.filter(function(s){return s.date!==date;});
    }
    // Write new sale + writeoffs
    var allSaleItems=[];

    // –Т—Б–њ–Њ–Љ–Њ–≥–∞—В–µ–ї—М–љ–∞—П —Д—Г–љ–Ї—Ж–Є—П: —А–µ–Ї—Г—А—Б–Є–≤–љ–Њ —А–∞–Ј–≤–Њ—А–∞—З–Є–≤–∞–µ—В –Я–§ –≤ —Б–њ–Є—Б–∞–љ–Є—П —Б—Л—А—М—П
    function expandIngWriteoffs(ingredients, portions, date, dishName){
      ingredients.forEach(function(ing){
        if(ing.type==='sf'){
          // –Я–Њ–ї—Г—Д–∞–±—А–Є–Ї–∞—В вЖТ —А–∞–Ј–≤–Њ—А–∞—З–Є–≤–∞–µ–Љ –≤ —Б—Л—А—М—С —А–µ–Ї—Г—А—Б–Є–≤–љ–Њ
          var sf=findSF(ing.sfId);
          if(!sf)return;
          var coef=(ing.coef!=null&&ing.coef!=='')?Number(ing.coef):1;
          if(coef<=0)coef=1;
          var sfQtyG=ing.weight*coef*portions; // –≥—А–∞–Љ–Љ–Њ–≤ –Я–§ –љ–∞ –≤—Б–µ –њ–Њ—А—Ж–Є–Є
          var sfYieldG=sf.yield||1000;         // –≤—Л—Е–Њ–і –Я–§ –≤ –≥—А–∞–Љ–Љ–∞—Е
          var sfRatio=sfQtyG/sfYieldG;         // –і–Њ–ї—П –њ–∞—А—В–Є–Є –Я–§
          // –†–µ–Ї—Г—А—Б–Є–≤–љ–Њ —Б–њ–Є—Б—Л–≤–∞–µ–Љ –Є–љ–≥—А–µ–і–Є–µ–љ—В—Л –Я–§
          expandIngWriteoffs(sf.ingredients||[], sfRatio, date, dishName+' ('+sf.name+')');
        } else {
          // –Ю–±—Л—З–љ—Л–є —В–Њ–≤–∞—А
          var qty=ing.weight*(ing.coef!=null?ing.coef:1)*portions;
          var p=findP(ing.pid);
          var unit=p?p.unit:'–≥';
          if(p){if(p.unit==='–Ї–≥'||p.unit==='–ї')qty=qty/1000;p.qty=p.qty-qty;}
          else{if(unit==='–Ї–≥'||unit==='–ї')qty=qty/1000;}
          DB.writeoffs.unshift({id:genId('W'),date:date,type:'–Я—А–Њ–і–∞–ґ–∞ –±–ї—О–і–∞',pid:ing.pid,productName:ing.name,unit:unit,qty:parseFloat(qty.toFixed(4)),cost:p?p.cost:0,dishName:dishName});
        }
      });
    }

    saleItems.forEach(function(si){
      var t=si.t;var portions=si.portions;
      expandIngWriteoffs(t.ingredients||[], portions, date, t.name);
      allSaleItems.push({ttkId:t.id,name:t.name,qty:portions,price:t.menuPrice});
    });
    DB.sales.unshift({id:genId('SL'),date:date,items:allSaleItems});
    allSaleItems.forEach(function(si){_salesDraft[si.ttkId]=si.qty;});
    _salesDraft._loadedDate=date;
    scheduleSave(['writeoffs','products','sales']);
    invalidateTTKCostCache();
    _forceCloseModal();
    showToast(successMsg);
    renderTab('salesd');
  } // end doSave

  // BUG-8 FIX: –љ–µ—Е–≤–∞—В–Ї–∞ —В–Њ–≤–∞—А–Њ–≤ —В—А–µ–±—Г–µ—В –њ–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Є—П, –∞ –љ–µ –њ—А–Њ—Б—В–Њ —В–Њ—Б—В–∞
  if(warnings.length){
    // –Ф–µ–і—Г–њ–ї–Є–Ї–∞—Ж–Є—П –њ—А–µ–і—Г–њ—А–µ–ґ–і–µ–љ–Є–є
    var uniqWarnings=[...new Set(warnings)];
    openConfirm(
      '–Э–µ —Е–≤–∞—В–∞–µ—В –Є–љ–≥—А–µ–і–Є–µ–љ—В–Њ–≤',
      uniqWarnings.slice(0,5).join(', ')+(uniqWarnings.length>5?' –Є –µ—Й—С '+(uniqWarnings.length-5)+'..':'')+'. –Ю—Б—В–∞—В–Ї–Є —Г–є–і—Г—В –≤ –Љ–Є–љ—Г—Б.',
      doSave,
      '–Т—Б—С —А–∞–≤–љ–Њ –Ј–∞—Д–Є–Ї—Б–Є—А–Њ–≤–∞—В—М'
    );
  }else{
    doSave();
  }
};

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// 9. –Ш–Э–Т–Х–Э–Ґ–Р–†–Ш–Ч–Р–¶–Ш–ѓ
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
var _invForm=null;
var _invCollapsed={};

function renderInventory(){
  var html='<button class="btn btn-p" onclick="startInventory()" style="margin-bottom:12px">+ –Э–Њ–≤–∞—П —А–µ–≤–Є–Ј–Є—П</button>';
  if(DB.inventory.length===0)html+='<div class="empty"><div class="empty-text">–Э–µ—В —А–µ–≤–Є–Ј–Є–є</div></div>';
  else html+=DB.inventory.map(function(inv,invIdx){
    var changedItems=inv.items.filter(function(i){return i.diff!==0;});
    var unchangedCount=inv.items.length-changedItems.length;
    var surplus=changedItems.filter(function(i){return i.diff>0;}).length;
    var shortage=changedItems.filter(function(i){return i.diff<0;}).length;
    var totalDiff=inv.items.reduce(function(s,i){return s+i.diff*(i.cost||0);},0);
    return '<div class="cd">'+
      '<div class="cd-title">–†–µ–≤–Є–Ј–Є—П '+inv.date+
        '<span style="font-size:10px;font-weight:400;color:#64748b;margin-left:8px">'+inv.items.length+' –њ–Њ–Ј–Є—Ж–Є–є</span>'+
        '<button class="btn btn-g btn-sm" onclick="editInventory('+invIdx+')" style="font-size:10px;padding:4px 10px;width:auto;margin-left:auto">вЬП –Ш–Ј–Љ–µ–љ–Є—В—М</button>'+
      '</div>'+
      '<div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap">'+
        '<span style="font-size:11px;color:#4ade80">–Ш–Ј–ї–Є—И–µ–Ї: '+surplus+'</span>'+
        '<span style="font-size:11px;color:#ef4444">–Э–µ–і–Њ—Б—В–∞—З–∞: '+shortage+'</span>'+
        (totalDiff!==0?'<span style="font-size:11px;color:'+(totalDiff>=0?'#4ade80':'#ef4444')+';font-weight:700">'+(totalDiff>0?'+':'')+fmt(totalDiff,0)+' вВЄ</span>':'')+
      '</div>'+
      '<div class="inv-row" style="font-size:9px;color:#475569;text-transform:uppercase;font-weight:700">'+
        '<span>–Ґ–Њ–≤–∞—А</span><span>–Я–Њ —Б–Є—Б—В–µ–Љ–µ</span><span>–§–∞–Ї—В.</span><span>–†–∞–Ј–љ–Є—Ж–∞</span>'+
      '</div>'+
      changedItems.map(function(it){
        var cl=it.diff>0?'#4ade80':it.diff<0?'#ef4444':'#64748b';
        var badge=it.diff>0?'<span style="font-size:9px;color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:4px;padding:1px 5px;margin-left:4px">+–њ—А–Є—Е–Њ–і</span>':
                            '<span style="font-size:9px;color:#ef4444;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:4px;padding:1px 5px;margin-left:4px">вИТ—Б–њ–Є—Б–∞–љ–Є–µ</span>';
        return '<div class="inv-row">'+
          '<div style="font-weight:600">'+it.name+badge+'</div>'+
          '<div>'+fmt(it.system,3)+' '+it.unit+'</div>'+
          '<div>'+fmt(it.actual,3)+' '+it.unit+'</div>'+
          '<div style="color:'+cl+';font-weight:700">'+(it.diff>0?'+':'')+fmt(it.diff,3)+'</div>'+
        '</div>';
      }).join('')+
      (unchangedCount>0?'<div style="font-size:10px;color:#475569;padding:6px 0">'+unchangedCount+' –њ–Њ–Ј–Є—Ж–Є–є –±–µ–Ј –Є–Ј–Љ–µ–љ–µ–љ–Є–є</div>':'')+
    '</div>';
  }).join('');
  return html;
}

window.editInventory=function(invIdx){
  var inv=DB.inventory[invIdx];if(!inv)return;
  // –Ю—В–Ї–∞—В—Л–≤–∞–µ–Љ –њ—А–µ–ґ–љ–Є–µ –Є–Ј–Љ–µ–љ–µ–љ–Є—П —Б–Ї–ї–∞–і–∞
  inv.items.forEach(function(it){
    var p=findP(it.pid);if(!p)return;
    // –Њ—В–Ї–∞—В: —Б—В–∞–≤–Є–Љ —Б–Ї–ї–∞–і –Њ–±—А–∞—В–љ–Њ –љ–∞ system (–Ј–љ–∞—З–µ–љ–Є–µ –Ф–Ю —А–µ–≤–Є–Ј–Є–Є)
    p.qty=it.system;
  });
  // –£–і–∞–ї—П–µ–Љ writeoffs —Б–Њ–Ј–і–∞–љ–љ—Л–µ —Н—В–Њ–є —А–µ–≤–Є–Ј–Є–µ–є (–њ–Њ –і–∞—В–µ + type=–Ш–љ–≤–µ–љ—В–∞—А–Є–Ј–∞—Ж–Є—П + note=–Э–µ–і–Њ—Б—В–∞—З–∞)
  // –•—А–∞–љ–Є–Љ invId –і–ї—П —В–Њ—З–љ–Њ–≥–Њ –Љ–∞—В—З–Є–љ–≥–∞
  if(inv.id){
    DB.writeoffs=DB.writeoffs.filter(function(w){return w.invId!==inv.id;});
    // Also remove surplus invoices created by this inventory revision
    DB.invoices=DB.invoices.filter(function(x){return x.invId!==inv.id;});
  }
  // –§–Њ—А–Љ–Є—А—Г–µ–Љ _invForm –Є–Ј —Н—В–Њ–є —А–µ–≤–Є–Ј–Є–Є (actual —Г–ґ–µ –Є–Ј–≤–µ—Б—В–µ–љ)
  _invGroupFilter='';_invCollapsed={};
  _invForm={
    date:inv.date,
    _editIdx:invIdx,
    _editId:inv.id,
    items:inv.items.map(function(it){
      return{pid:it.pid,name:it.name,unit:it.unit,cost:it.cost,system:it.system,actual:it.actual,_touched:true,supplier:(findP(it.pid)||{}).supplier||''};
    })
  };
  // –Ф–Њ–±–∞–≤–ї—П–µ–Љ —В–Њ–≤–∞—А—Л –Ї–Њ—В–Њ—А—Л—Е –љ–µ –±—Л–ї–Њ –њ—А–Є –Є—Б—Е–Њ–і–љ–Њ–є —А–µ–≤–Є–Ј–Є–Є
  DB.products.forEach(function(p){
    if(!_invForm.items.some(function(it){return it.pid===p.id;})){
      _invForm.items.push({pid:p.id,name:p.name,unit:p.unit,cost:p.cost,system:p.qty,actual:p.qty,_touched:false,supplier:p.supplier||''});
    }
  });
// BUG-7 FIX: scheduleSave —Г–±—А–∞–љ –Њ—В—Б—О–і–∞ вАФ –Њ—В–Ї–∞—В –і–∞–љ–љ—Л—Е –љ–µ –і–Њ–ї–ґ–µ–љ —Б–Њ—Е—А–∞–љ—П—В—М—Б—П
// –і–Њ —В–Њ–≥–Њ –Ї–∞–Ї –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї—М –љ–∞–ґ–Љ—С—В "–Ю–±–љ–Њ–≤–Є—В—М —А–µ–≤–Є–Ј–Є—О"
  rebuildIndexes();invalidateTTKCostCache();
  window.startInventory._openModal(_invForm);
};

window._invSearchUpdate=function(){
  var inp=document.getElementById('invSearchInput');
  var v=inp?inp.value:'';
  var q=v.toLowerCase().trim();
  var d=document.getElementById('invSearchDrop');
  var listEl=document.getElementById('invList');
  var clearBtn=document.getElementById('invSearchClear');
  if(clearBtn)clearBtn.style.display=v?'block':'none';
  if(d){
    if(!q){d.style.display='none';}
    else{
      var m=(_invForm?_invForm.items:[]).filter(function(it){return it.name.toLowerCase().includes(q);});
      if(m.length){
        d.innerHTML=m.slice(0,20).map(function(it){
          return '<div class="inv-search-item" onmousedown="event.preventDefault();_invSearchPick(\''+esc(it.name)+'\')">' +
            '<span style="font-weight:600">'+esc(it.name)+'</span>'+
            '<span style="font-size:10px;color:#64748b;margin-left:8px">'+it.unit+'</span>'+
          '</div>';
        }).join('');
        // –Я–Њ–Ј–Є—Ж–Є–Њ–љ–Є—А—Г–µ–Љ fixed-–і—А–Њ–њ –њ–Њ –Ї–Њ–Њ—А–і–Є–љ–∞—В–∞–Љ –Є–љ–њ—Г—В–∞
        if(inp){
          var r=inp.getBoundingClientRect();
          d.style.top=(r.bottom+4)+'px';
          d.style.left=r.left+'px';
          d.style.width=r.width+'px';
          // –Я–µ—А–µ–≤–Њ—А–∞—З–Є–≤–∞–µ–Љ –≤–≤–µ—А—Е –µ—Б–ї–Є –Љ–∞–ї–Њ –Љ–µ—Б—В–∞ —Б–љ–Є–Ј—Г
          if(window.innerHeight-r.bottom < 240){
            d.style.top='';
            d.style.bottom=(window.innerHeight-r.top+4)+'px';
          }
        }
        d.style.display='block';
      }else{d.style.display='none';}
    }
  }
  if(listEl&&window.buildInvList)listEl.innerHTML=window.buildInvList();
};

window._invSearchPick=function(name){
  // –Я—А–Њ–Ї—А—Г—З–Є–≤–∞–µ–Љ –Ї –≤—Л–±—А–∞–љ–љ–Њ–Љ—Г —В–Њ–≤–∞—А—Г –≤ —Б–њ–Є—Б–Ї–µ –њ–Њ—Б–ї–µ —Б–±—А–Њ—Б–∞ —Д–Є–ї—М—В—А–∞
  var inp=document.getElementById('invSearchInput');
  if(inp){inp.value='';} // —Б–±—А–∞—Б—Л–≤–∞–µ–Љ –њ–Њ–Є—Б–Ї вАФ –њ–Њ–Ї–∞–Ј—Л–≤–∞–µ–Љ –њ–Њ–ї–љ—Л–є —Б–њ–Є—Б–Њ–Ї
  var d=document.getElementById('invSearchDrop');
  if(d)d.style.display='none';
  var clearBtn=document.getElementById('invSearchClear');
  if(clearBtn)clearBtn.style.display='none';
  // –Я–µ—А–µ—А–Є—Б–Њ–≤—Л–≤–∞–µ–Љ –њ–Њ–ї–љ—Л–є —Б–њ–Є—Б–Њ–Ї (–±–µ–Ј —Д–Є–ї—М—В—А–∞)
  var listEl=document.getElementById('invList');
  if(listEl&&window.buildInvList)listEl.innerHTML=window.buildInvList();
  // –Я—А–Њ–Ї—А—Г—З–Є–≤–∞–µ–Љ –Ї –љ—Г–ґ–љ–Њ–Љ—Г —В–Њ–≤–∞—А—Г
  setTimeout(function(){
    if(!listEl)return;
    var nameLow=name.toLowerCase();
    var rows=listEl.querySelectorAll('div[style*="grid-template-columns"]');
    for(var i=0;i<rows.length;i++){
      var txt=rows[i].querySelector('div[style*="font-size:12px"]');
      if(txt&&txt.textContent.toLowerCase().indexOf(nameLow)>=0){
        rows[i].scrollIntoView({block:'center',behavior:'smooth'});
        // –Я–Њ–і—Б–≤–µ—З–Є–≤–∞–µ–Љ —Б—В—А–Њ–Ї—Г –љ–∞ —Б–µ–Ї—Г–љ–і—Г
        rows[i].style.background='rgba(99,102,241,.12)';
        rows[i].style.borderRadius='8px';
        rows[i].style.transition='background .3s';
        setTimeout(function(r){r.style.background='';},1000,rows[i]);
        // –§–Њ–Ї—Г—Б–Є—А—Г–µ–Љ –њ–Њ–ї–µ —Д–∞–Ї—В–∞ —Н—В–Њ–є —Б—В—А–Њ–Ї–Є
        var factInput=rows[i].querySelector('input');
        if(factInput)setTimeout(function(el){el.focus();},300,factInput);
        break;
      }
    }
  },50);
};

window.submitSFInventoryAndGoStep2=function(){
  if(!isOwner()){showToast('–Э–µ—В –і–Њ—Б—В—Г–њ–∞','err');return;}
  var date=(document.getElementById('sfInvDate')||{}).value||toDay();
  var touchedItems=window._sfInvItems.filter(function(it){return it._touched;});
  if(!touchedItems.length){
    // –Э–µ—В –і–∞–љ–љ—Л—Е вАФ –њ—А–Њ–њ—Г—Б–Ї–∞–µ–Љ —И–∞–≥ 1, –Є–і—С–Љ –Ї —И–∞–≥—Г 2
    _forceCloseModal();
    startInventoryProductsOnly();
    return;
  }
  // –°–њ–Є—Б—Л–≤–∞–µ–Љ —Б—Л—А—М—С: –і–ї—П –Ї–∞–ґ–і–Њ–≥–Њ –Я–§ —Г –Ї–Њ—В–Њ—А–Њ–≥–Њ —Г–Ї–∞–Ј–∞–љ —Д–∞–Ї—В вАФ —Б–њ–Є—Б—Л–≤–∞–µ–Љ –Є–љ–≥—А–µ–і–Є–µ–љ—В—Л
  var writeoffsAdded=0;
  touchedItems.forEach(function(it){
    var sf=findSF(it.sfId);
    if(!sf)return;
    var actualQty=it.actual; // –Ї–≥/—И—В/–ї –Я–§ —Д–∞–Ї—В–Є—З–µ—Б–Ї–Є
    if(actualQty<=0)return;
    // actualQty –≤ –µ–і–Є–љ–Є—Ж–∞—Е sf.unit. –Я–µ—А–µ–≤–Њ–і–Є–Љ –≤ –≥—А–∞–Љ–Љ—Л –і–ї—П —А–∞—Б—З—С—В–∞
    var sfUnit=sf.unit||'–Ї–≥';
    var actualG=(sfUnit==='–Ї–≥'||sfUnit==='–ї')?actualQty*1000:actualQty; // –≥
    var yieldG=sf.yield||1000;
    // –°–Ї–Њ–ї—М–Ї–Њ –њ–∞—А—В–Є–є = actualG / yieldG
    var batches=actualG/yieldG;
    // –°–њ–Є—Б—Л–≤–∞–µ–Љ –Є–љ–≥—А–µ–і–Є–µ–љ—В—Л * batches
    (sf.ingredients||[]).forEach(function(ing){
      var p=findP(ing.pid);if(!p)return;
      var coef=(ing.coef!=null&&ing.coef!=='')?Number(ing.coef):1;if(coef<=0)coef=1;
      var qty=ing.weight*coef*batches;
      var pUnit=p.unit;
      if(pUnit==='–Ї–≥'||pUnit==='–ї')qty=qty/1000;
      qty=parseFloat(qty.toFixed(4));
      if(qty<=0)return;
      p.qty=p.qty-qty;
      DB.writeoffs.unshift({id:genId('W'),date:date,type:'–Ш–љ–≤–µ–љ—В–∞—А–Є–Ј–∞—Ж–Є—П',pid:p.id,productName:p.name,unit:pUnit,qty:qty,cost:p.cost,note:'–†–µ–≤–Є–Ј–Є—П –Я–§: '+sf.name+' ('+it.actual+' '+sf.unit+')'});
      writeoffsAdded++;
    });
  });
  rebuildIndexes();invalidateTTKCostCache();
  if(writeoffsAdded>0)scheduleSave(['writeoffs','products']);
  showToast('–®–∞–≥ 1 –≥–Њ—В–Њ–≤ вАФ '+writeoffsAdded+' –њ–Њ–Ј–Є—Ж–Є–є —Б–њ–Є—Б–∞–љ–Њ');
  _forceCloseModal();
  // –Я–µ—А–µ—Е–Њ–і–Є–Љ –Ї —И–∞–≥—Г 2
  setTimeout(function(){
    startInventoryProductsOnly();
  },300);
};

window.submitInventory=function(){if(!isOwner()){showToast('–Э–µ—В –і–Њ—Б—В—Г–њ–∞','err');return;}
  _invForm.date=document.getElementById('invdate').value;
  var isEdit=_invForm._editIdx!=null;
  var items=_invForm.items.map(function(it){
    var actualVal=it._touched?it.actual:it.system;
    var diff=parseFloat((actualVal-it.system).toFixed(4));
    return{pid:it.pid,name:it.name,unit:it.unit,cost:it.cost||0,system:it.system,actual:actualVal,diff:diff};
  });

  var invId=isEdit?_invForm._editId:genId('INVI');

  // FEATURE 6: –Є–Ј–ї–Є—И–µ–Ї —Б–Њ–Ј–і–∞—С—В –њ—А–Є—Е–Њ–і –≤ DB.invoices + FEATURE 5: —Б–њ–Є—Б–∞–љ–Є—П –њ–Њ–Љ–µ—З–∞–µ–Љ invId
  items.forEach(function(it){
    var p=findP(it.pid);if(!p)return;
    // –Т—Б–µ–≥–і–∞ —Б–Є–љ—Е—А–Њ–љ–Є–Ј–Є—А—Г–µ–Љ –Њ—Б—В–∞—В–Њ–Ї —Б —Д–∞–Ї—В–Њ–Љ (–≤–Ї–ї—О—З–∞—П diff=0 вАФ —Г–±–Є—А–∞–µ—В —А–∞—Б—Б–Є–љ—Е—А–Њ–љ –њ—А–Є —А–µ–і–∞–Ї—В–Є—А–Њ–≤–∞–љ–Є–Є)
    p.qty=it.actual;
    if(it.diff!==0){
      if(it.diff<0){
        // –Э–µ–і–Њ—Б—В–∞—З–∞ вЖТ —Б–њ–Є—Б–∞–љ–Є–µ (–њ–Њ–Љ–µ—З–∞–µ–Љ invId –і–ї—П —В–Њ—З–љ–Њ–≥–Њ –Њ—В–Ї–∞—В–∞ –њ—А–Є —А–µ–і–∞–Ї—В–Є—А–Њ–≤–∞–љ–Є–Є)
        DB.writeoffs.unshift({id:genId('W'),invId:invId,date:_invForm.date,type:'–Ш–љ–≤–µ–љ—В–∞—А–Є–Ј–∞—Ж–Є—П',productName:it.name,unit:it.unit,qty:Math.abs(it.diff),cost:it.cost||0,note:'–Э–µ–і–Њ—Б—В–∞—З–∞'});
      }else{
        // FEATURE 6: –Ш–Ј–ї–Є—И–µ–Ї вЖТ –∞–≤—В–Њ–Љ–∞—В–Є—З–µ—Б–Ї–Є–є –њ—А–Є—Е–Њ–і –≤ –Є—Б—В–Њ—А–Є—О –њ–Њ—Б—В–∞–≤–Њ–Ї
        var existingInvInvoice=DB.invoices.find(function(inv){return inv.invId===invId;});
        if(!existingInvInvoice){
          existingInvInvoice={id:genId('INV_INC'),invId:invId,date:_invForm.date,supplier:'–Ш–љ–≤–µ–љ—В–∞—А–Є–Ј–∞—Ж–Є—П',items:[]};
          DB.invoices.unshift(existingInvInvoice);
        }
        existingInvInvoice.items.push({name:it.name,qty:it.diff,unit:it.unit,price:it.cost||0});
      }
    }
  });

  rebuildIndexes();invalidateTTKCostCache();

  if(isEdit){
    // –Ч–∞–Љ–µ–љ—П–µ–Љ –Ј–∞–њ–Є—Б—М —А–µ–≤–Є–Ј–Є–Є вАФ –Є—Й–µ–Љ –њ–Њ id –Ї–∞–Ї fallback –µ—Б–ї–Є –Є–љ–і–µ–Ї—Б —Б–Љ–µ—Б—В–Є–ї—Б—П
    var editIdx=_invForm._editIdx;
    if(DB.inventory[editIdx]&&DB.inventory[editIdx].id===_invForm._editId){
      DB.inventory[editIdx]={id:invId,date:_invForm.date,items:items};
    }else{
      var realIdx=DB.inventory.findIndex(function(x){return x.id===_invForm._editId;});
      if(realIdx>=0)DB.inventory[realIdx]={id:invId,date:_invForm.date,items:items};
      else DB.inventory.unshift({id:invId,date:_invForm.date,items:items});
    }
  }else{
    DB.inventory.unshift({id:invId,date:_invForm.date,items:items});
  }

  scheduleSave(['inventory','products','writeoffs','invoices']);
  _forceCloseModal();showToast(isEdit?'–†–µ–≤–Є–Ј–Є—П –Њ–±–љ–Њ–≤–ї–µ–љ–∞ вЬУ':'–†–µ–≤–Є–Ј–Є—П —Б–Њ—Е—А–∞–љ–µ–љ–∞ вЬУ');renderTab('invent');
};

// –Ч–∞–≥—А—Г–ґ–∞–µ–Љ –Т–°–Х –Ї–ї—О—З–Є workspace –Њ–і–љ–Є–Љ –Ј–∞–њ—А–Њ—Б–Њ–Љ
async function loadAllData(){
  var uid=getUserId();
  var url=SUPABASE_URL+'/rest/v1/'+SUPABASE_TABLE+
    '?user_id=eq.'+encodeURIComponent(uid)+
    '&select=key,value';
  var ctrl=new AbortController();
  var timer=setTimeout(function(){ctrl.abort();},8000);
  try{
    var res=await fetch(url,{headers:getAuthHeaders(),signal:ctrl.signal});
    clearTimeout(timer);
    if(!res.ok)throw new Error('loadAll error: '+res.status);
    var rows=await res.json();
    var map={};
    if(rows&&rows.length){rows.forEach(function(r){map[r.key]=r.value;});}
    return map;
  }catch(e){
    clearTimeout(timer);
    throw e;
  }
}

function showAuthError(msg){

  if(!email || !pass){ showAuthError('–Т–≤–µ–і–Є—В–µ email –Є –њ–∞—А–Њ–ї—М'); return; }

    var licId = licRows[0].id;

    var signupData = await sbAuth('signup', {email:email, password:pass, data:{name:name}});
    if(!signupData.access_token) throw new Error('–Ю—И–Є–±–Ї–∞ —А–µ–≥–Є—Б—В—А–∞—Ж–Є–Є. –Я–Њ–њ—А–Њ–±—Г–є—В–µ –µ—Й—С —А–∞–Ј.');
    AUTH.session = signupData;
    // 3. –У–µ–љ–µ—А–Є—А—Г–µ–Љ workspace_id –Є invite_code
    var workspaceId = 'ws_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    var inviteCode = Math.random().toString(36).slice(2,6).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();

    await fetch(SUPABASE_URL+'/rest/v1/esep_licenses?id=eq.'+encodeURIComponent(licId),{
      method:'PATCH',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+signupData.access_token,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({is_used:true,used_at:new Date().toISOString(),used_by:email,used_by_name:name})
    });
    // 5. –°–Њ—Е—А–∞–љ—П–µ–Љ –њ—А–Њ—Д–Є–ї—М
    await sbREST('POST','esep_profiles','',{
      id: signupData.user.id,

      name: name,
      role: 'owner',
      workspace_id: workspaceId,
      invite_code: inviteCode,

async function onAuthSuccess(sessionData){
  AUTH.session = sessionData;
  // Always persist latest session (tokens may have been refreshed)
  try{ localStorage.setItem('_esep_session', JSON.stringify(sessionData)); }catch(e){}
  // –Ч–∞–≥—А—Г–ґ–∞–µ–Љ –њ—А–Њ—Д–Є–ї—М –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї—П
  var uid = sessionData.user.id;
  var url = SUPABASE_URL + '/rest/v1/esep_profiles?id=eq.' + uid + '&limit=1';
  var res = await fetch(url, {headers: getAuthHeaders()});
  var rows = await res.json();
  if(!rows || !rows.length) throw new Error('–Я—А–Њ—Д–Є–ї—М –љ–µ –љ–∞–є–і–µ–љ. –Ю–±—А–∞—В–Є—В–µ—Б—М –Ї –∞–і–Љ–Є–љ–Є—Б—В—А–∞—В–Њ—А—Г.');

  AUTH.profile = profile;
  AUTH.role = profile.role;
  AUTH.workspaceId = profile.workspace_id;
  await loadAppData();
}

function genLicCode(){
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var part=function(){var s='';for(var i=0;i<4;i++)s+=chars[Math.floor(Math.random()*chars.length)];return s;};
  return part()+'-'+part();
}

  var code = genLicCode();
  var id = 'lic_'+Date.now().toString(36);
  try{
    var res = await fetch(SUPABASE_URL+'/rest/v1/esep_licenses',{
      method:'POST',
      headers:{...getAuthHeaders(),'Prefer':'return=minimal'},

      '<div style="background:#1e293b;border:1px solid rgba(250,204,21,.3);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px">'+

        '<div id="newLicCode" style="font-size:28px;font-weight:900;color:#facc15;letter-spacing:.2em;font-family:monospace">'+code+'</div>'+
        (note?'<div style="font-size:10px;color:#64748b;margin-top:6px">'+esc(note)+'</div>':'')+
      '</div>'+
      '<button class="btn btn-p" id="copyLicBtn" style="margin-bottom:8px">–°–Ї–Њ–њ–Є—А–Њ–≤–∞—В—М –Ї–Њ–і</button>'+
      '<button class="btn btn-g btn-sm" onclick="closeModal()" style="width:100%">–Ч–∞–Ї—А—Л—В—М</button>'
    );
    setTimeout(function(){
      var btn=document.getElementById('copyLicBtn');

window.loadLicenses = async function(){
  if(!isSuperAdmin())return;
  var el=document.getElementById('licenseList');
  if(!el)return;
  el.innerHTML='<div style="font-size:11px;color:#475569;text-align:center;padding:8px">–Ч–∞–≥—А—Г–Ј–Ї–∞...</div>';
  try{
    var res=await fetch(SUPABASE_URL+'/rest/v1/esep_licenses?order=created_at.desc&limit=50',
      {headers:getAuthHeaders()});
    var rows=await res.json();
    if(!rows||!rows.length){
      el.innerHTML='<div style="font-size:11px;color:#475569;text-align:center;padding:8px">–Э–µ—В –ї–Є—Ж–µ–љ–Ј–Є–є</div>';
      return;
    }
    el.innerHTML=rows.map(function(lic){
      var usedColor=lic.is_used?'#ef4444':'#4ade80';
      var usedLabel=lic.is_used?'–Ш—Б–њ–Њ–ї—М–Ј–Њ–≤–∞–љ':'–Р–Ї—В–Є–≤–µ–љ';
      return '<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:6px">'+
            '<span style="font-size:13px;font-weight:800;font-family:monospace;color:#facc15;letter-spacing:.1em">'+lic.code+'</span>'+
            '<span style="font-size:9px;padding:1px 6px;border-radius:5px;background:rgba('+(lic.is_used?'239,68,68':'74,222,128')+',.1);color:'+usedColor+';font-weight:700">'+usedLabel+'</span>'+
          '</div>'+
          '<div style="font-size:10px;color:#64748b;margin-top:2px">'+
            (lic.note?'<span style="color:#94a3b8">'+esc(lic.note)+'</span> ¬Ј ':'') +
            lic.created_at.slice(0,10)+
            (lic.is_used&&lic.used_by_name?' вЖТ <span style="color:#ef4444">'+esc(lic.used_by_name)+'</span>':'')+
          '</div>'+
        '</div>'+
        (!lic.is_used?
          '<button data-code="'+esc(lic.code)+'" onclick="copyLicCode(this.dataset.code)" style="flex-shrink:0;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.2);color:#facc15;border-radius:8px;padding:4px 8px;font-size:10px;cursor:pointer">–Ъ–Њ–њ–Є—А–Њ–≤–∞—В—М</button>':'')+
        (!lic.is_used?
          '<button data-lid="'+esc(lic.id)+'" onclick="deleteLicense(this.dataset.lid)" style="flex-shrink:0;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:8px;padding:4px 8px;font-size:10px;cursor:pointer">√Ч</button>':'')+
      '</div>';
    }).join('');
  }catch(e){
    el.innerHTML='<div style="font-size:11px;color:#ef4444;text-align:center;padding:8px">–Ю—И–Є–±–Ї–∞ –Ј–∞–≥—А—Г–Ј–Ї–Є</div>';
  }
};

window.copyLicCode = function(code){

  else{var ta=document.createElement('textarea');ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('–°–Ї–Њ–њ–Є—А–Њ–≤–∞–љ–Њ вЬУ');}
};

window.deleteLicense = async function(id){
  if(!isSuperAdmin()){showToast('–Э–µ—В –і–Њ—Б—В—Г–њ–∞','err');return;}
  openConfirm('–£–і–∞–ї–Є—В—М –ї–Є—Ж–µ–љ–Ј–Є—О?','–Ъ–Њ–і –±—Г–і–µ—В –і–µ–∞–Ї—В–Є–≤–Є—А–Њ–≤–∞–љ –љ–∞–≤—Б–µ–≥–і–∞.',async function(){
    try{
      await fetch(SUPABASE_URL+'/rest/v1/esep_licenses?id=eq.'+encodeURIComponent(id),
        {method:'DELETE',headers:getAuthHeaders()});

};

window.doLogout = async function(){
  openConfirm('–Т—Л–є—В–Є –Є–Ј –∞–Ї–Ї–∞—Г–љ—В–∞?', AUTH.profile ? AUTH.profile.email : '', async function(){
    try{
      if(AUTH.session){
        await fetch(SUPABASE_URL+'/auth/v1/logout', {
          method:'POST',

};

// вФАвФА INVITE CODE MODAL вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function openInviteCodeModal(code){
  var safeCode = String(code||'');
  var h = [];
  h.push('<div class="modal-title" style="color:#4ade80">–Р–Ї–Ї–∞—Г–љ—В —Б–Њ–Ј–і–∞–љ!</div>');
  h.push('<div style="font-size:13px;color:#94a3b8;margin-bottom:16px">–Я–Њ–і–µ–ї–Є—В–µ—Б—М —Н—В–Є–Љ –Ї–Њ–і–Њ–Љ —Б –Љ–µ–љ–µ–і–ґ–µ—А–∞–Љ–Є. –Ю–љ–Є –Є—Б–њ–Њ–ї—М–Ј—Г—О—В –µ–≥–Њ –њ—А–Є —А–µ–≥–Є—Б—В—А–∞—Ж–Є–Є.</div>');
  h.push('<div style="background:#1e293b;border:1px solid rgba(99,102,241,.3);border-radius:12px;padding:16px;text-align:center;margin-bottom:16px">');
  h.push('<div style="font-size:11px;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em">–Ъ–Њ–і –њ—А–Є–≥–ї–∞—И–µ–љ–Є—П</div>');
  h.push('<div id="invCodeText" style="font-size:26px;font-weight:900;color:#6366f1;letter-spacing:.15em;font-family:monospace">'+safeCode+'</div>');
  h.push('</div>');
  h.push('<button class="btn btn-p" id="copyInvCodeBtn" style="margin-bottom:8px">–°–Ї–Њ–њ–Є—А–Њ–≤–∞—В—М –Ї–Њ–і</button>');
  h.push('<button class="btn btn-g btn-sm" onclick="closeModal()" style="width:100%">–Ч–∞–Ї—А—Л—В—М</button>');
  openModal(h.join(''));
  // Attach copy handler after modal is in DOM
  setTimeout(function(){
    var btn = document.getElementById('copyInvCodeBtn');
    if(btn) btn.onclick = function(){
      if(navigator.clipboard){
        navigator.clipboard.writeText(safeCode).then(function(){ showToast('–°–Ї–Њ–њ–Є—А–Њ–≤–∞–љ–Њ \u2713'); }).catch(function(){ fallbackCopy(safeCode); });
      } else { fallbackCopy(safeCode); }
    };
  }, 50);
}
function fallbackCopy(text){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('–°–Ї–Њ–њ–Є—А–Њ–≤–∞–љ–Њ \u2713'); } catch(e) { showToast('–°–Ї–Њ–њ–Є—А—Г–є—В–µ –≤—А—Г—З–љ—Г—О: '+text); }
  document.body.removeChild(ta);
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// INIT
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
async function init(){
  // –Ш–љ–Є—Ж–Є–∞–ї–Є–Ј–Є—А—Г–µ–Љ Telegram WebApp
  try{
    var tg=window.Telegram&&window.Telegram.WebApp;
    if(tg){
      try{tg.ready();}catch(e){}
      try{tg.expand();}catch(e){}
      try{tg.setHeaderColor('#0b1120');}catch(e){}
      try{tg.setBackgroundColor('#0b1120');}catch(e){}
    }
  }catch(e){}

  // –Я—А–Њ–±—Г–µ–Љ –≤–Њ—Б—Б—В–∞–љ–Њ–≤–Є—В—М —Б–µ—Б—Б–Є—О –Є–Ј localStorage
  var savedSession = null;
  try{ savedSession = JSON.parse(localStorage.getItem('_esep_session') || 'null'); }catch(e){}

  if(savedSession && savedSession.access_token){
    try{
      // –Я—А–Њ–≤–µ—А—П–µ–Љ —В–Њ–Ї–µ–љ
      var userRes = await fetch(SUPABASE_URL+'/auth/v1/user', {
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+savedSession.access_token}
      });
      if(userRes.ok){
        savedSession.user = await userRes.json();
        await onAuthSuccess(savedSession);
        return;
      }
      // –Ґ–Њ–Ї–µ–љ –Є—Б—В—С–Ї вАФ –њ—А–Њ–±—Г–µ–Љ refresh
      if(savedSession.refresh_token){
        var refreshData = await sbAuth('token?grant_type=refresh_token', {refresh_token: savedSession.refresh_token});
        await onAuthSuccess(refreshData);
        return;
      }
    }catch(e){ }
  }

  // –Э–µ—В —Б–µ—Б—Б–Є–Є вАФ –њ–Њ–Ї–∞–Ј—Л–≤–∞–µ–Љ —Н–Ї—А–∞–љ –≤—Е–Њ–і–∞
  document.getElementById('loadingScreen').style.display='none';
  showAuthScreen('login');
}

// Swipe navigation вАФ DISABLED (sidebar nav only)

init();

// вФАвФА GLOBAL: Enter key closes keyboard (registered once) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
if(!window._enterListenerAdded){
  window._enterListenerAdded = true;
  document.addEventListener('keydown', function(e){
    if(e.key !== 'Enter') return;
    var t = e.target;
    var tag = t.tagName;
    var type = (t.type || '').toLowerCase();
    if(tag === 'TEXTAREA' || tag === 'BUTTON' || tag === 'SELECT') return;
    if(type === 'date' || type === 'time' || type === 'datetime-local') return;
    if(t.hasAttribute('data-enter-submit')) return;
    e.preventDefault();
    t.blur();
  }, true);
}
